<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0d0017 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Rajdhani',sans-serif;overflow:hidden;user-select:none;}
#title{font-family:'Cinzel Decorative',cursive;color:#ffd700;font-size:18px;text-shadow:0 0 20px #ff8c00,0 2px 0 #8b4500;letter-spacing:2px;margin-bottom:6px;}
#game-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
#arena{display:block;border:2px solid #3d2b6b;border-radius:4px 4px 0 0;box-shadow:0 0 30px rgba(80,0,150,0.5);cursor:crosshair;}
#hud-top{position:absolute;top:6px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 10px;pointer-events:none;}
.crown-bar{display:flex;gap:4px;}
.crown{font-size:14px;filter:grayscale(1);transition:filter 0.3s;}
.crown.active{filter:none;}
#timer-box{background:rgba(0,0,0,0.75);border:1px solid #ffd700;color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;padding:2px 14px;border-radius:20px;text-shadow:0 0 8px #ff8c00;letter-spacing:2px;}
#timer-box.danger{border-color:#ff4444;color:#ff4444;animation:pulse 0.5s infinite alternate;}
@keyframes pulse{from{opacity:1;}to{opacity:0.5;}}
#ui{width:360px;background:linear-gradient(to bottom,#1c0f35,#120b22);border:2px solid #3d2b6b;border-top:none;border-radius:0 0 12px 12px;padding:8px 10px 10px;}
#elixir-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;}
#elixir-label{color:#c77dff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;width:52px;}
.e-pip{flex:1;height:10px;border-radius:3px;background:#2d1a4a;border:1px solid #4a2d7a;transition:background 0.15s,box-shadow 0.15s;}
.e-pip.on{background:linear-gradient(to right,#9b59b6,#c77dff);box-shadow:0 0 6px #9b59b6;border-color:#c77dff;}
#elixir-num{color:#e0c3fc;font-size:20px;font-weight:700;width:24px;text-align:right;text-shadow:0 0 8px #9b59b6;}
#hand{display:flex;gap:5px;justify-content:center;}
.card{width:80px;height:98px;border-radius:8px 8px 6px 6px;border:2px solid #7a5c1e;background:linear-gradient(170deg,#2d1f0e 0%,#1a1008 100%);cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;flex-shrink:0;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none;}
.card:hover:not(.locked){transform:translateY(-8px) scale(1.04);box-shadow:0 10px 25px rgba(0,0,0,0.6);}
.card.selected{border-color:#ffd700;box-shadow:0 0 18px #ffd700,0 0 6px #ffd700 inset;transform:translateY(-12px) scale(1.06);}
.card.locked{opacity:0.45;cursor:not-allowed;}
.card-art{font-size:30px;line-height:1;margin-bottom:2px;}
.card-name{color:#f0d080;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;text-align:center;padding:0 3px;}
.card-cost{position:absolute;bottom:5px;right:6px;background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:white;font-size:14px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #c77dff;font-family:'Rajdhani',sans-serif;}
.card-type-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.card.champion-card{border-color:#f39c12;background:linear-gradient(170deg,#3d2800 0%,#1a1000 100%);}
.card.evo-card{border-color:#c77dff;background:linear-gradient(170deg,#1a0030 0%,#0d0020 100%);box-shadow:0 0 8px rgba(180,0,255,0.4);}
.card.legendary-card{border-color:#1abc9c;background:linear-gradient(170deg,#0a2a22 0%,#04120e 100%);}
.evo-badge{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:7px;font-weight:700;color:#c77dff;letter-spacing:1px;}
/* ── EVO CYCLE SYSTEM ── */
.card.evo-cycle-locked{opacity:0.7!important;cursor:not-allowed!important;}
.card.evo-ready{box-shadow:0 0 18px #c77dff,0 0 8px #a855f7 inset!important;animation:evo-pulse .7s infinite alternate!important;}
@keyframes evo-pulse{from{box-shadow:0 0 10px #c77dff;}to{box-shadow:0 0 24px #c77dff,0 0 12px #a855f7 inset;}}
.evo-cycle-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px 6px 4px 4px;z-index:3;pointer-events:none;gap:2px;}
.evo-cycle-icon{font-size:16px;line-height:1;}
.evo-cycle-text{color:#c77dff;font-size:8px;font-weight:700;letter-spacing:.5px;}
.evo-cycle-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(150,0,255,0.2);border-radius:0 0 4px 4px;}
.evo-cycle-bar{height:3px;background:linear-gradient(90deg,#7c3aed,#c77dff);border-radius:0 0 0 4px;transition:width .25s;}
.ability-btn{width:80px;height:98px;border-radius:8px 8px 6px 6px;border:2px solid #f1c40f;background:linear-gradient(170deg,#3a2800 0%,#1a1000 100%);cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;transition:transform 0.1s,box-shadow 0.1s;box-shadow:0 0 12px rgba(241,196,15,0.4);}
.ability-btn:hover:not(.cd):not(.no-elixir){transform:translateY(-6px);box-shadow:0 8px 24px rgba(241,196,15,0.6);}
.ability-btn.cd,.ability-btn.no-elixir{opacity:0.5;cursor:not-allowed;}
.ability-icon{font-size:26px;margin-bottom:2px;}
.ability-label{color:#f1c40f;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;text-align:center;}
.ability-cost{position:absolute;bottom:5px;right:6px;background:linear-gradient(135deg,#b7950b,#f1c40f);color:#000;font-size:14px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #ffd700;font-family:'Rajdhani',sans-serif;}
.cd-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;color:#aaa;font-size:22px;font-weight:700;}
#hint{color:rgba(200,180,255,0.5);font-size:10px;text-align:center;margin-top:6px;letter-spacing:1px;text-transform:uppercase;}
#overlay{display:none;position:absolute;inset:0;background:rgba(5,0,20,0.88);border-radius:4px 4px 0 0;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;}
#overlay.show{display:flex;}
#result-emoji{font-size:56px;}
#result-text{font-family:'Cinzel Decorative',cursive;font-size:24px;text-shadow:0 0 20px currentColor;}
#result-text.win{color:#ffd700;}
#result-text.lose{color:#ff4444;}
#result-text.draw{color:#aaaaaa;}
#crown-result{font-size:28px;letter-spacing:6px;}
#btn-restart{background:linear-gradient(135deg,#e67e22,#e74c3c);color:white;border:none;padding:12px 32px;font-size:16px;font-weight:700;font-family:'Rajdhani',sans-serif;border-radius:25px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;box-shadow:0 4px 15px rgba(231,76,60,0.5);transition:transform 0.1s;margin-top:4px;}
#btn-restart:hover{transform:scale(1.07);}
#abilities-bar{display:flex;gap:6px;justify-content:center;min-height:0;overflow:hidden;transition:max-height 0.2s;}
#abilities-bar:empty{display:none;}
.champ-ability-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 10px;border-radius:8px;border:2px solid #f39c12;background:linear-gradient(170deg,#3d2800,#1a1000);cursor:pointer;position:relative;transition:transform 0.1s,box-shadow 0.1s;box-shadow:0 0 10px rgba(241,196,15,0.3);}
.champ-ability-btn:hover:not(.disabled){transform:translateY(-3px);box-shadow:0 6px 18px rgba(241,196,15,0.5);}
.champ-ability-btn.disabled{opacity:0.45;cursor:not-allowed;}
.champ-ability-btn.gm-btn{border-color:#e67e22;box-shadow:0 0 10px rgba(230,126,34,0.3);}
.champ-ability-btn.gm-btn:hover:not(.disabled){box-shadow:0 6px 18px rgba(230,126,34,0.5);}
.cab-icon{font-size:20px;line-height:1;}
.cab-name{color:#f0d080;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.cab-label{color:#aaa;font-size:7px;text-align:center;white-space:nowrap;}
.cab-cost{position:absolute;bottom:3px;right:5px;background:linear-gradient(135deg,#b7950b,#f1c40f);color:#000;font-size:11px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #ffd700;}
.cab-cd{position:absolute;inset:0;background:rgba(0,0,0,0.6);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:18px;font-weight:700;}

/* ── DECK SELECTION SCREEN ── */
#deck-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0a2e 0%,#0d0017 100%);z-index:100;display:flex;flex-direction:column;align-items:stretch;overflow:hidden;}
#deck-screen.hidden{display:none;}
/* ── HOME SCREEN ── */
#home-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;overflow:hidden;font-family:'Cinzel Decorative',cursive;}
#home-screen.hidden{display:none;}
#hs-bg{position:absolute;inset:0;background:linear-gradient(180deg,#1a3a6e 0%,#1565c0 40%,#1976d2 100%);}
#hs-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.03) 0,rgba(255,255,255,0.03) 1px,transparent 1px,transparent 50%);background-size:20px 20px;}
#hs-top{position:relative;z-index:2;width:100%;padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
#hs-name{color:#fff;font-size:16px;font-weight:900;font-family:sans-serif;text-shadow:0 2px 6px #000;}
#hs-trophies{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);border:1.5px solid #ffd740;border-radius:20px;padding:4px 12px;}
#hs-trophy-icon{font-size:16px;}
#hs-trophy-count{color:#ffd740;font-size:16px;font-weight:900;font-family:sans-serif;}
#hs-arena-wrap{position:relative;z-index:2;flex:1;width:100%;display:flex;align-items:center;justify-content:center;}
#hs-arena-canvas{border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
#hs-bottom{position:relative;z-index:2;width:100%;padding:10px 14px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
#hs-btn-deck{background:linear-gradient(135deg,#7b1fa2,#9c27b0);border:2px solid #ce93d8;border-radius:14px;color:#fff;font-size:13px;font-weight:900;font-family:sans-serif;padding:10px 28px;cursor:pointer;box-shadow:0 4px 14px rgba(123,31,162,0.5);letter-spacing:1px;transition:transform .1s,box-shadow .1s;}
#hs-btn-deck:active{transform:scale(0.96);box-shadow:0 2px 6px rgba(0,0,0,0.5);}
#hs-btn-battle{background:linear-gradient(135deg,#e65100,#ff6d00);border:2px solid #ffb74d;border-radius:18px;color:#fff;font-size:18px;font-weight:900;font-family:sans-serif;padding:14px 0;width:70%;cursor:pointer;box-shadow:0 6px 20px rgba(230,81,0,0.6);letter-spacing:2px;transition:transform .1s;}
#hs-btn-battle:active{transform:scale(0.96);}
#hs-result-toast{background:rgba(0,0,0,0.8);border-radius:14px;padding:10px 20px;text-align:center;font-family:sans-serif;display:none;}
#hs-result-toast.show{display:block;}
#hs-result-emoji{font-size:32px;}
#hs-result-label{font-size:14px;font-weight:900;margin:2px 0;}
#hs-result-trophies{font-size:20px;font-weight:900;}
#hs-result-trophies.gain{color:#ffd740;}
#hs-result-trophies.loss{color:#ef5350;}
/* ═══════════════════════════════════════════
   NEW DECK BUILDER — full layout
═══════════════════════════════════════════ */
/* Header strip */
#db-header{background:linear-gradient(90deg,#12002a,#1e0040,#12002a);border-bottom:2px solid #3d0070;padding:8px 12px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#db-title{font-family:'Cinzel Decorative',cursive;color:#ffd700;font-size:13px;text-shadow:0 0 12px #ff8c00;letter-spacing:1px;}
#db-avg{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.5);border:1.5px solid #5b2d8a;border-radius:20px;padding:3px 10px;}
#db-avg-label{color:rgba(200,180,255,0.6);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:sans-serif;}
#db-avg-val{color:#c77dff;font-size:15px;font-weight:900;font-family:'Rajdhani',sans-serif;}
#db-start-btn{background:linear-gradient(135deg,#e65100,#ff6d00);border:2px solid #ffb74d;border-radius:14px;color:#fff;font-size:11px;font-weight:900;font-family:sans-serif;padding:6px 14px;cursor:pointer;opacity:.35;pointer-events:none;letter-spacing:.5px;transition:opacity .2s,transform .1s;}
#db-start-btn.ready{opacity:1;pointer-events:all;}
#db-start-btn.ready:active{transform:scale(0.95);}

/* ── TOP PANEL: your deck ── */
#db-top{background:linear-gradient(180deg,rgba(30,0,60,0.95) 0%,rgba(18,0,40,0.98) 100%);border-bottom:2px solid #3d0070;padding:8px 10px 6px;flex-shrink:0;}
#db-deck-label{color:rgba(200,180,255,0.5);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:6px;font-family:sans-serif;}
#db-slots{display:flex;gap:5px;justify-content:center;flex-wrap:nowrap;}

/* individual deck slot */
.db-slot{width:38px;height:52px;border-radius:6px;border:2px dashed #3d2060;background:rgba(255,255,255,0.03);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;flex-shrink:0;overflow:hidden;}
.db-slot:empty-icon::after{content:'＋';color:rgba(200,180,255,0.2);font-size:16px;}
/* filled */
.db-slot.filled{border-style:solid;border-color:#5b2d8a;}
.db-slot.filled:active{transform:scale(0.93);}
/* slot types */
.db-slot.slot-evo{border-color:#8e24aa;box-shadow:0 0 6px rgba(142,36,170,0.4);}
.db-slot.slot-evo.filled{border-color:#ce93d8;box-shadow:0 0 10px rgba(206,147,216,0.6);}
.db-slot.slot-champion{border-color:#b8860b;box-shadow:0 0 6px rgba(255,193,7,0.3);}
.db-slot.slot-champion.filled{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.6);}
.db-slot.slot-wild{border-color:#00bcd4;box-shadow:0 0 6px rgba(0,188,212,0.3);}
.db-slot.slot-wild.filled{border-color:#4dd0e1;box-shadow:0 0 10px rgba(77,208,225,0.5);}
/* selected to replace */
.db-slot.replacing{border-color:#f44336;box-shadow:0 0 12px rgba(244,67,54,0.8);animation:db-pulse-red .4s infinite alternate;}
@keyframes db-pulse-red{from{box-shadow:0 0 8px rgba(244,67,54,0.7);}to{box-shadow:0 0 18px rgba(244,67,54,1);}}
/* highlight when viewing */
.db-slot.selected{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,0.7);transform:translateY(-3px);}

.db-slot-icon{font-size:20px;line-height:1;pointer-events:none;}
.db-slot-name{color:#f0d080;font-size:5px;font-weight:700;text-transform:uppercase;text-align:center;padding:0 1px;pointer-events:none;line-height:1.2;margin-top:1px;}
.db-slot-cost{position:absolute;bottom:2px;right:2px;background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:white;font-size:9px;font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #c77dff;pointer-events:none;}
.db-slot-lvl{position:absolute;top:2px;left:2px;background:rgba(0,0,0,0.7);color:#ffd700;font-size:6px;font-weight:900;border-radius:3px;padding:0 2px;line-height:1.4;pointer-events:none;}
.db-slot-type-bar{position:absolute;top:0;left:0;right:0;height:2px;pointer-events:none;}
/* EVO/CHAMP badge on slot card */
.db-slot-badge{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:5px;font-weight:700;letter-spacing:.5px;pointer-events:none;}
.db-slot-badge.evo{color:#ce93d8;}
.db-slot-badge.champ{color:#ffd700;}
/* special slot label */
.db-slot-spec-label{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:5px;font-weight:700;letter-spacing:.3px;pointer-events:none;}
.db-slot.slot-evo .db-slot-spec-label{color:#ce93d8;}
.db-slot.slot-champion .db-slot-spec-label{color:#ffd700;}
.db-slot.slot-wild .db-slot-spec-label{color:#4dd0e1;}
/* slot empty placeholder */
.db-slot-empty-ico{font-size:18px;opacity:.18;pointer-events:none;}

/* action bar below deck */
#db-action-bar{min-height:32px;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 10px 2px;flex-shrink:0;}
.db-action-btn{font-size:11px;font-weight:700;font-family:sans-serif;border-radius:14px;padding:5px 14px;border:none;cursor:pointer;transition:transform .1s;display:none;}
.db-action-btn:active{transform:scale(0.93);}
#db-btn-use{background:linear-gradient(135deg,#1b5e20,#43a047);color:#fff;border:1.5px solid #81c784;}
#db-btn-remove{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff;border:1.5px solid #ef9a9a;}
#db-btn-replace-info{background:rgba(255,152,0,0.15);color:#ffb74d;border:1.5px solid #ff8f00;font-size:10px;border-radius:10px;padding:5px 12px;display:none;text-align:center;}
#db-btn-switch{background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;border:1.5px solid #64b5f6;}

/* ── BOTTOM PANEL: collection ── */
#db-bottom{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* filter bar */
#db-filters{background:rgba(0,0,0,0.5);border-bottom:1px solid #2a1040;padding:5px 8px;display:flex;gap:5px;align-items:center;flex-shrink:0;overflow-x:auto;}
#db-filters::-webkit-scrollbar{height:3px;}
#db-filters::-webkit-scrollbar-thumb{background:#5b2d8a;border-radius:3px;}
.db-filter-btn{font-size:9px;font-weight:700;font-family:sans-serif;border-radius:20px;padding:4px 9px;border:1.5px solid #3d2060;background:rgba(255,255,255,0.05);color:rgba(200,180,255,0.7);cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,color .15s;flex-shrink:0;}
.db-filter-btn.active{background:rgba(142,36,170,0.4);border-color:#ce93d8;color:#fff;}
/* collection grid */
#db-collection{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;align-content:start;}
#db-collection::-webkit-scrollbar{width:4px;}
#db-collection::-webkit-scrollbar-thumb{background:#5b2d8a;border-radius:4px;}

/* collection card */
.dc{border-radius:8px 8px 6px 6px;border:2px solid #3d2b6b;background:linear-gradient(170deg,#2d1f0e 0%,#1a1008 100%);cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:transform .15s,box-shadow .15s,border-color .15s;padding:4px 2px 18px;min-height:76px;}
.dc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none;}
.dc:active{transform:scale(0.94);}
.dc.dc-sel{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,0.7);transform:translateY(-3px);}
.dc.dc-champion{border-color:#f39c12;background:linear-gradient(170deg,#3d2800 0%,#1a1000 100%);}
.dc.dc-evo{border-color:#c77dff;background:linear-gradient(170deg,#1a0030 0%,#0d0020 100%);box-shadow:0 0 6px rgba(180,0,255,0.25);}
.dc.dc-legendary{border-color:#1abc9c;background:linear-gradient(170deg,#0a2a22 0%,#04120e 100%);}
.dc.dc-campeon{border-color:#ffd700;background:linear-gradient(170deg,#3a2000 0%,#1a0e00 100%);box-shadow:0 0 8px rgba(255,200,0,0.35);}
.dc.dc-sel.dc-campeon{box-shadow:0 0 18px #ffd700,0 0 6px #ff8c00 inset;}
.dc-art{font-size:22px;line-height:1;margin-bottom:1px;}
.dc-name{color:#f0d080;font-size:6.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:center;padding:0 2px;}
.dc-cost{position:absolute;bottom:3px;right:4px;background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:white;font-size:11px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #c77dff;font-family:'Rajdhani',sans-serif;}
.dc-type-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.dc-badge{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:5.5px;font-weight:700;color:#c77dff;letter-spacing:.8px;}
.dc-lvl{position:absolute;bottom:3px;left:4px;color:#ffd700;font-size:6px;font-weight:900;font-family:sans-serif;}
/* rarity pips */
.dc-rarity{position:absolute;top:3px;right:3px;font-size:6px;opacity:.8;}

/* drag ghost */
#db-drag-ghost{position:fixed;pointer-events:none;z-index:9999;width:44px;height:60px;border-radius:8px;border:2px solid #fff;background:linear-gradient(170deg,#2d1f0e,#1a1008);display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,0.8);transform:translate(-50%,-50%) scale(1.18);opacity:.92;}
#db-drag-ghost .dg-art{font-size:22px;line-height:1;}
#db-drag-ghost .dg-name{color:#f0d080;font-size:5.5px;font-weight:700;text-transform:uppercase;text-align:center;}
#db-drag-ghost .dg-cost{position:absolute;bottom:3px;right:3px;background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:#fff;font-size:10px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #c77dff;}
.db-slot.drag-over{border-color:#00e5ff!important;box-shadow:0 0 18px #00e5ff!important;transform:scale(1.12)!important;}
.db-slot.drag-source{opacity:.4;transform:scale(0.9)!important;}

/* ── NEXT CARD PREVIEW ── */
#next-wrap{display:flex;align-items:center;gap:6px;margin-left:4px;}
#next-label{color:rgba(200,180,255,0.55);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;writing-mode:vertical-rl;text-orientation:mixed;}
#next-card-preview{width:46px;height:58px;border-radius:6px 6px 5px 5px;border:1.5px solid #3d2b6b;background:linear-gradient(170deg,#2d1f0e 0%,#1a1008 100%);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;opacity:0.8;}
#next-card-preview .dc-art{font-size:18px;}
#next-card-preview .dc-name{font-size:6px;}
#next-card-preview .dc-cost{font-size:10px;width:16px;height:16px;bottom:3px;right:3px;}

const shuffle = a => [...a].sort(()=>Math.random()-0.5);
const d2 = (ax,ay,bx,by) => { const dx=ax-bx,dy=ay-by; return Math.sqrt(dx*dx+dy*dy); };

function spark(x,y,txt,col){
  S.particles.push({x,y,txt,col,life:1.4,vy:-1.0+(Math.random()-0.5)*0.4});
}
function sparkle(x,y,art,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,r=Math.random()*35;
    S.particles.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,txt:art,col,life:0.7,vy:-0.7});
  }
}
function nextCard(hand,deck){
  hand.push(deck.length>0?deck.shift():NORMAL_KEYS[Math.floor(Math.random()*NORMAL_KEYS.length)]);
}

function applyKnockback(target, sx, sy, power, dur) {
  if(target.isKing !== undefined || target.id || target.isTesla || target.invuln || (target.jumpState === 'jumping')) return;
  const dx = target.x - sx, dy = target.y - sy;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  target.vx = (dx/dist) * power;
  target.vy = (dy/dist) * power;
  target.kbTimer = dur;
}

function doAoEDamage(cx, cy, radius, dmg, team, kbPower, isRanged) {
  const enemies = team === 'player' ? [...S.eTroops, ...S.eTowers] : [...S.pTroops, ...S.pTowers];
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (d2(cx, cy, e.x, e.y) <= radius) {
      applyDmgToTarget(e, dmg, !!isRanged);
      spark(e.x, e.y - 15, '-' + dmg, team === 'player' ? '#ff5500' : '#5555ff');
      if (kbPower > 0) applyKnockback(e, cx, cy, kbPower, 0.25);
    }
  }
  sparkle(cx, cy, '💢', '#7f8c8d', 8);
}

// ── Aplicar daño con soporte de Evo y Escudo ──
function applyDmgToTarget(target, dmg, isRanged){
  if(!target || target.hp <= 0) return 0;
  // Knight Evo: ataques a distancia/hechizos solo hacen 10%
  if(isRanged && target.isKnightEvo) dmg = Math.max(1, Math.round(dmg * 0.10));
  // Knight Champion: escudo absorbe daño primero
  if(target.shieldHp > 0){
    const abs = Math.min(target.shieldHp, dmg);
    target.shieldHp -= abs;
    dmg -= abs;
    if(abs > 0) S.particles.push({x:target.x,y:target.y-(target.h||20)/2-4,txt:'🛡-'+abs,col:'#ffd700',life:1.0,vy:-0.8});
    if(target.shieldHp <= 0){
      sparkle(target.x, target.y, '💛', '#ffd700', 4);
      spark(target.x, target.y-28, '🛡 ROTO!', '#ff8800');
    }
  }
  target.hp -= dmg;
  return dmg;
}

let playerChosenDeck = null;

(function buildDeckScreen(){
  /* ── RARITY MAP ── */
  const RARITY = {
    // Torres / estructuras
    tesla_tower:'common', mortar:'common', cannon:'common',
    inferno_tower:'rare', goblin_hut:'rare',
    // Hechizos
    earthquake:'rare', vine:'rare', goblin_barrel:'epic',
    barbarian_barrel:'epic', the_log:'legendary', fireball:'rare',
    // Tropas comunes
    knight:'common', archers:'common', barbarians:'common',
    knight_evo:'common', knight_champion:'legendary',
    goblins:'common', spear_goblins:'common', fire_spirit:'common',
    electric_spirit:'common', ice_spirit:'common', earth_spirit:'common',
    flamethrower:'common',
    // Tropas raras
    hog_rider:'rare', balloon:'rare', elixir_golem:'rare',
    dart_goblin:'rare', heal_spirit:'rare', warrior_healer:'rare',
    musketeer:'rare', giant:'rare', minipekka:'rare',
    healing_spirit:'rare',
    // Tropas épicas
    golem:'epic', goblin_barrel:'epic', electric_dragon:'epic', pekka:'epic',
    firecracker:'epic',
    // Legendarias
    mother_witch:'legendary', the_log:'legendary',
    infernal_dragon:'legendary', megaknight:'legendary',
    witch:'epic', witch_evo:'epic',
    archers_evo:'epic', musketeer_evo:'epic',
    // Héroes (Campeones)
    golden_knight:'campeon', gran_minero:'campeon', knight_champion:'legendary',
    royal_hogs:'common',
  };

  /* ── LEVEL SYSTEM ── */
  // At level 1: stats are 55% of base. At level 16: 100%.
  // Each level adds (100-55)/15 = 3% of base.
  function statMultiplier(lvl){ return 0.55 + (lvl - 1) * (0.45 / 15); }

  /* ── CARD LEVELS (persisted in object, start at 1) ── */
  const cardLevels = {};
  function getLevel(key){ return cardLevels[key] || 1; }

  /* ── SLOT DEFINITIONS ── */
  // indices 0-4 normal, 5 evo-only, 6 champion-only, 7 wild
  const SLOT_TYPES = ['normal','normal','normal','normal','normal','evo','champion','wild'];
  const SLOT_LABELS = {normal:'',evo:'✦ EVO',champion:'👑 HÉROE',wild:'🃏 WILD'};

  /* ── STATE ── */
  const deck = new Array(8).fill(null); // key or null per slot
  let selectedKey = null;      // key highlighted in collection
  let selectedSlotIdx = null;  // slot highlighted in deck
  let replacingMode = false;   // waiting for user to pick slot to replace

  /* ── ELEMENTS ── */
  const slotsContainer = document.getElementById('db-slots');
  const collectionEl   = document.getElementById('db-collection');
  const avgVal         = document.getElementById('db-avg-val');
  const startBtn       = document.getElementById('db-start-btn');
  const btnUse         = document.getElementById('db-btn-use');
  const btnRemove      = document.getElementById('db-btn-remove');
  const btnSwitch      = document.getElementById('db-btn-switch');
  const replaceInfo    = document.getElementById('db-btn-replace-info');
  const filterBtns     = document.querySelectorAll('.db-filter-btn');

  let activeFilter = 'all';

  /* ── HELPERS ── */
  function deckFull(){ return deck.every(s=>s!==null); }
  function deckCount(){ return deck.filter(s=>s!==null).length; }
  function firstEmpty(){ return deck.findIndex(s=>s===null); }
  function inDeck(key){ return deck.includes(key); }

  function canGoInSlot(key, slotIdx){
    const def = DEFS[key];
    const t = SLOT_TYPES[slotIdx];
    if(t==='normal')    return !def.champion && !def.evolution;
    if(t==='evo')       return !!def.evolution || !!def.isWitch || key==='knight' || key==='archers' || key==='musketeer';
    if(t==='champion')  return !!def.champion || key==='knight'; // knight base puede ir al slot de campeón → knight_champion
    if(t==='wild')      return !!def.evolution || !!def.champion || !!def.isWitch || key==='knight' || key==='archers' || key==='musketeer';
    return true;
  }

  // When witch goes to evo/wild slot → upgrade to witch_evo
  // When knight goes to evo/wild slot → upgrade to knight_evo
  // When knight goes to champion slot → upgrade to knight_champion
  function resolveKey(key, slotIdx){
    const def = DEFS[key];
    const t = SLOT_TYPES[slotIdx];
    if(def.isWitch && !def.evolution && (t==='evo'||t==='wild')) return 'witch_evo';
    if(key==='knight' && t==='champion') return 'knight_champion';
    if(key==='knight' && (t==='evo'||t==='wild')) return 'knight_evo';
    if(key==='archers' && (t==='evo'||t==='wild')) return 'archers_evo';
    if(key==='musketeer' && (t==='evo'||t==='wild')) return 'musketeer_evo';
    return key;
  }

  function bestSlotFor(key){
    const def = DEFS[key];
    const isNormalCard = !def.champion && !def.evolution && !def.isWitch;
    for(let i=0;i<8;i++){
      if(deck[i]!==null) continue;
      if(isNormalCard && SLOT_TYPES[i] !== 'normal') continue;
      if(canGoInSlot(key,i)) return i;
    }
    if(isNormalCard) return -1;
    return firstEmpty();
  }

  /* ── DRAG & DROP STATE ── */
  const drag = { active:false, srcIdx:-1, ghost:null, pressTimer:null };

  function initDrag(){
    drag.ghost = document.getElementById('db-drag-ghost');
  }

  function startDrag(srcIdx, clientX, clientY){
    const key = deck[srcIdx];
    if(!key) return;
    drag.active  = true;
    drag.srcIdx  = srcIdx;
    const def = DEFS[key];
    drag.ghost.querySelector('.dg-art').textContent  = def.art;
    drag.ghost.querySelector('.dg-name').textContent = def.name;
    drag.ghost.querySelector('.dg-cost').textContent = def.cost;
    drag.ghost.style.borderColor = def.color;
    drag.ghost.style.display = 'flex';
    moveDragGhost(clientX, clientY);
    renderSlots(); // marks drag-source slot
    // haptic if supported
    if(navigator.vibrate) navigator.vibrate(40);
  }

  function moveDragGhost(cx, cy){
    drag.ghost.style.left = cx + 'px';
    drag.ghost.style.top  = cy + 'px';
    // highlight nearest slot
    document.querySelectorAll('.db-slot').forEach((el,i)=>{
      el.classList.remove('drag-over');
      if(i===drag.srcIdx) return;
      const r = el.getBoundingClientRect();
      const mx = r.left+r.width/2, my = r.top+r.height/2;
      const dist = Math.hypot(cx-mx, cy-my);
      if(dist<36) el.classList.add('drag-over');
    });
  }

  function endDrag(cx, cy){
    drag.ghost.style.display = 'none';
    drag.active = false;
    // find target slot
    let target = -1, bestDist = 44;
    document.querySelectorAll('.db-slot').forEach((el,i)=>{
      if(i===drag.srcIdx) return;
      const r = el.getBoundingClientRect();
      const mx = r.left+r.width/2, my = r.top+r.height/2;
      const dist = Math.hypot(cx-mx, cy-my);
      if(dist<bestDist){ bestDist=dist; target=i; }
      el.classList.remove('drag-over');
    });
    if(target>=0 && target!==drag.srcIdx){
      const srcKey = deck[drag.srcIdx];
      const dstKey = deck[target];
      // check compatibility
      const srcOk = canGoInSlot(srcKey, target);
      const dstOk = dstKey ? canGoInSlot(dstKey, drag.srcIdx) : true;
      if(srcOk){
        deck[target]    = resolveKey(srcKey, target);
        deck[drag.srcIdx] = dstKey && dstOk ? resolveKey(dstKey, drag.srcIdx) : (dstOk?dstKey:null);
        // if dst was incompatible with src slot, clear src
        if(dstKey && !dstOk) deck[drag.srcIdx]=null;
      }
    }
    drag.srcIdx = -1;
    renderSlots(); renderCollection(); renderActionBar(); renderAvg();
  }

  function cancelDrag(){
    drag.ghost.style.display='none';
    drag.active=false;
    drag.srcIdx=-1;
    clearTimeout(drag.pressTimer);
    renderSlots();
  }

  /* attach touch events to slots container (event delegation) */
  function attachSlotDrag(){
    slotsContainer.addEventListener('touchstart', e=>{
      const slotEl = e.target.closest('.db-slot');
      if(!slotEl) return;
      const idx = [...slotsContainer.children].indexOf(slotEl);
      if(idx<0||!deck[idx]) return;
      const t = e.touches[0];
      drag.pressTimer = setTimeout(()=>startDrag(idx,t.clientX,t.clientY), 380);
    }, {passive:true});

    slotsContainer.addEventListener('touchmove', e=>{
      clearTimeout(drag.pressTimer);
      if(!drag.active) return;
      e.preventDefault();
      const t = e.touches[0];
      moveDragGhost(t.clientX, t.clientY);
    }, {passive:false});

    slotsContainer.addEventListener('touchend', e=>{
      clearTimeout(drag.pressTimer);
      if(!drag.active) return;
      const t = e.changedTouches[0];
      endDrag(t.clientX, t.clientY);
    }, {passive:true});

    slotsContainer.addEventListener('touchcancel', ()=>{ clearTimeout(drag.pressTimer); cancelDrag(); }, {passive:true});
  }

  /* ── RENDER AVERAGE ── */
  function renderAvg(){
    const filled = deck.filter(s=>s!==null);
    if(!filled.length){ avgVal.textContent='—'; return; }
    const avg = filled.reduce((s,k)=>s+DEFS[k].cost,0)/filled.length;
    avgVal.textContent = avg.toFixed(1);
    startBtn.classList.toggle('ready', filled.length===8);
  }

  /* ── RENDER SLOTS ── */
  function renderSlots(){
    slotsContainer.innerHTML='';
    for(let i=0;i<8;i++){
      const key = deck[i];
      const type = SLOT_TYPES[i];
      const el = document.createElement('div');
      el.className = 'db-slot slot-'+type + (key?' filled':'');
      if(selectedSlotIdx===i) el.classList.add('selected');
      if(drag.active && drag.srcIdx===i) el.classList.add('drag-source');
      if(replacingMode && key===null && selectedKey && canGoInSlot(selectedKey,i))
        el.classList.add('replacing');

      if(key){
        const def = DEFS[key];
        const lvl = getLevel(key);
        const mul = statMultiplier(lvl);
        const hp  = def.hp  ? Math.round(def.hp*mul)  : null;
        const dmg = def.dmg ? Math.round(def.dmg*mul) : null;
        el.innerHTML=`
          <div class="db-slot-type-bar" style="background:${def.color}"></div>
          ${type!=='normal'?`<div class="db-slot-spec-label">${SLOT_LABELS[type]}</div>`:''}
          <div class="db-slot-lvl">Lv${lvl}</div>
          <div class="db-slot-icon">${def.art}</div>
          <div class="db-slot-name">${def.name}</div>
          <div class="db-slot-cost">${def.cost}</div>
          ${def.evolution?'<div class="db-slot-badge evo">✦EVO</div>':''}
          ${def.champion?'<div class="db-slot-badge champ">⭐</div>':''}`;
      } else {
        const icons = {evo:'✦',champion:'👑',wild:'🃏',normal:'＋'};
        el.innerHTML=`
          ${type!=='normal'?`<div class="db-slot-spec-label">${SLOT_LABELS[type]}</div>`:''}
          <div class="db-slot-empty-ico">${icons[type]||'＋'}</div>`;
      }

      el.onclick = ()=> onSlotClick(i);
      slotsContainer.appendChild(el);
    }
  }

  /* ── RENDER COLLECTION ── */
  function renderCollection(){
    collectionEl.innerHTML='';
    const inDeckKeys = new Set(deck.filter(Boolean));
    // Also track base keys whose evolutions/champion versions are in the deck
    const baseKeysInDeck = new Set();
    for(const k of inDeckKeys){
      if(k==='knight_evo')      baseKeysInDeck.add('knight');
      if(k==='knight_champion') baseKeysInDeck.add('knight');
      if(k==='witch_evo')       baseKeysInDeck.add('witch');
      if(k==='archers_evo')     baseKeysInDeck.add('archers');
      if(k==='musketeer_evo')   baseKeysInDeck.add('musketeer');
    }
    const ALL_KEYS = Object.keys(DEFS).filter(k=>{
      const d=DEFS[k];
      if(d.hidden) return false;
      if(inDeckKeys.has(k)) return false;
      if(baseKeysInDeck.has(k)) return false;
      if(activeFilter==='all') return true;
      if(activeFilter==='evo') return !!d.evolution || canGoInSlot(k, 5);
      if(activeFilter==='champion') return !!d.champion || canGoInSlot(k, 6);
      const r = RARITY[k]||'common';
      if(['common','rare','epic','legendary','campeon'].includes(activeFilter)) return r===activeFilter;
      const cost = parseInt(activeFilter);
      if(!isNaN(cost)){
        if(cost===5) return d.cost>=5;
        return d.cost===cost;
      }
      return true;
    });

    ALL_KEYS.forEach(key=>{
      const def = DEFS[key];
      const lvl = getLevel(key);
      const r = RARITY[key]||'common';
      const rarityIcon = {common:'⚪',rare:'🔵',epic:'🟣',legendary:'🟡',campeon:'👑'}[r]||'⚪';
      const el = document.createElement('div');
      el.className='dc'+(def.champion?' dc-champion':'')+(def.evolution?' dc-evo':'')
                   +(def.legendary?' dc-legendary':'')+(r==='campeon'?' dc-campeon':'')+(selectedKey===key?' dc-sel':'');
      el.innerHTML=`
        <div class="dc-type-bar" style="background:${def.color}"></div>
        ${def.evolution?'<div class="dc-badge">✦ EVO ✦</div>':''}
        ${def.champion?'<div class="dc-badge" style="color:#ffd700">⭐ HÉROE</div>':''}
        <div class="dc-art">${def.art}</div>
        <div class="dc-name">${def.name}</div>
        <div class="dc-lvl">Lv${lvl}</div>
        <div class="dc-rarity">${rarityIcon}</div>
        <div class="dc-cost">${def.cost}</div>`;
      el.onclick = ()=> onCardClick(key);
      collectionEl.appendChild(el);
    });
  }

  /* ── ACTION BAR ── */
  function renderActionBar(){
    // hide all
    btnUse.style.display='none';
    btnRemove.style.display='none';
    btnSwitch.style.display='none';
    replaceInfo.style.display='none';

    if(replacingMode){
      replaceInfo.style.display='block';
      return;
    }

    if(selectedSlotIdx!==null && deck[selectedSlotIdx]){
      // a deck card is selected
      btnRemove.style.display='block';
      // check if wild slot and card has both evo+champion variants
      const key = deck[selectedSlotIdx];
      const def = DEFS[key];
      const type = SLOT_TYPES[selectedSlotIdx];
      if(type==='wild' && def.evolution && def.champion) btnSwitch.style.display='block';
      return;
    }

    if(selectedKey){
      if(!deckFull()){
        const slot = bestSlotFor(selectedKey);
        if(slot!==-1) btnUse.style.display='block';
      } else {
        // deck full — show replace info
        replaceInfo.style.display='block';
        replaceInfo.textContent='Toca el slot del mazo que quieres reemplazar';
      }
    }
  }

  /* ── CLICK HANDLERS ── */
  function onCardClick(key){
    // deselect slot
    selectedSlotIdx = null;
    replacingMode = false;
    if(selectedKey===key){ selectedKey=null; }
    else {
      selectedKey = key;
      if(deckFull()) replacingMode=true;
    }
    renderSlots();
    renderCollection();
    renderActionBar();
  }

  function onSlotClick(i){
    if(replacingMode && selectedKey){
      deck[i] = resolveKey(selectedKey, i);
      selectedKey=null; selectedSlotIdx=null; replacingMode=false;
      renderSlots(); renderCollection(); renderActionBar(); renderAvg();
      return;
    }

    if(deck[i]){
      selectedSlotIdx = (selectedSlotIdx===i) ? null : i;
      selectedKey=null; replacingMode=false;
    } else {
      selectedSlotIdx=null;
    }
    renderSlots(); renderCollection(); renderActionBar();
  }

  /* btn USE */
  btnUse.onclick=()=>{
    if(!selectedKey) return;
    const slot = bestSlotFor(selectedKey);
    if(slot===-1) return;
    deck[slot] = resolveKey(selectedKey, slot);
    selectedKey=null;
    renderSlots(); renderCollection(); renderActionBar(); renderAvg();
  };

  /* btn REMOVE */
  btnRemove.onclick=()=>{
    if(selectedSlotIdx===null) return;
    deck[selectedSlotIdx]=null;
    selectedSlotIdx=null;
    renderSlots(); renderCollection(); renderActionBar(); renderAvg();
  };

  /* btn SWITCH (wild slot version toggle — stub: toggles between evo/champion badge) */
  btnSwitch.onclick=()=>{
    // In a full implementation this would toggle the card variant.
    // For now show a spark effect to indicate it was pressed.
    btnSwitch.textContent='✅ Cambiado';
    setTimeout(()=>{btnSwitch.textContent='🔄 Cambiar versión';},800);
  };

  /* filters */
  filterBtns.forEach(btn=>{
    btn.onclick=()=>{
      filterBtns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter=btn.dataset.filter;
      renderCollection();
    };
  });

  /* START */
  startBtn.onclick=()=>{
    if(deckCount()<8) return;
    playerChosenDeck=[...deck];
    document.getElementById('deck-screen').classList.add('hidden');
    showHomeScreen(null);
    animateHomeArena();
  };

  /* initial render */
  initDrag();
  renderSlots();
  attachSlotDrag();
  renderCollection();
  renderActionBar();
  renderAvg();

})();

    bombs:[],
    barrels:[],
    rollingBarrels:[],
    mortarShells:[],
    logs:[],
    earthquakes:[],
    vines:[],
    // EVO cycle tracker: key → plays remaining until ready
    evoCycleMap: (()=>{
      const map={};
      for(const key of pFull){
        const d=DEFS[key];
        if(d && d.evolution) map[key] = d.cost<5 ? 8 : 4;
      }
      return map;
    })(),
  };
}

    hp:d.hp, maxHp:d.hp, dmg:d.dmg,
    range:d.range, spd:d.spd, atkSpd:d.atkSpd, atkCd:0,
    w:d.rw||16, h:d.rh||20, color:d.color, art:d.art,
    pref:d.pref||null,
    champion:!!d.champion,
    evolution:!!d.evolution,
    legendary:!!d.legendary,
    isMegaKnight:!!d.isMegaKnight,
    isFirecracker:!!d.isFirecracker,
    isGranMinero:!!d.isGranMinero,
    isTesla:!!d.isTesla,
    teslaHidden: !!d.isTesla,
    teslaHideCd: 0,
    slowTimer:0, slowFactor:1,
    isKnightEvo:!!d.isKnightEvo,
    isKnightChamp:!!d.isKnightChamp,
    shieldHp:0,
    tauntTarget:null, tauntTimer:0,
    isMotherWitch:!!d.isMotherWitch,
    isCursed:false,
    isBalloon:!!d.isBalloon,
    isAir:!!d.isAir,
    targetsAir:d.targetsAir!==false,
    isSpirit: !!d.isSpirit,
    isFireSpirit: !!d.isFireSpirit,
    isElectricSpirit: !!d.isElectricSpirit,
    isIceSpirit: !!d.isIceSpirit,
    isHealingSpirit: !!d.isHealingSpirit,
    spiritTriggered: false,
    isCannon: !!d.isCannon,
    isGoblinHut: !!d.isGoblinHut,
    goblinHutTimer: d.isGoblinHut ? d.hutDuration : 0,
    goblinHutSpawnCd: d.isGoblinHut ? 0 : 0,
    goblinHutActive: false,
    isInfernoTower: !!d.isInfernoTower,
    isInfernoDragon: !!d.isInfernoDragon,
    itTarget: null,
    itRamp: 0,
    isElectricDragon: !!d.isElectricDragon,
    edLastChain: [],
    isWarriorHealer: !!d.isWarriorHealer,
    isMortar: !!d.isMortar,
    gmTarget:null, gmRamp:0,
    vx:0, vy:0, kbTimer:0,
    dashState:'idle', dashDelay:0, dashCount:0, dashTarget:null, invuln:false,
    jumpState:'idle', jumpTime:0, jumpMaxTime:0, jumpChargeTime:0, startX:0, startY:0, jumpX:0, jumpY:0,
    // Witch (base or evo)
    isWitch: !!d.isWitch,
    spawnCd: d.isWitch ? (d.firstSpawnInterval||2) : (d.spawnInterval||0),
    witchOwner:null,
    overhealCap: d.overhealCap ? Math.round(d.hp * d.overhealCap) : d.hp,
    // Arqueras EVO

}
