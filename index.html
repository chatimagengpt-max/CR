// ═══════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H); drawBg();
  drawVines();
  for(const t of[...S.pTowers,...S.eTowers]) drawTower(t);
  for(const t of[...S.pTroops,...S.eTroops]) drawTroop(t);
  if(S.selected!==null) drawZone();
  drawProjectiles();
  drawBombs();
  drawBarrels();
  drawRollingBarrels();
  drawMortarShells();
  drawLogs();
  drawEarthquakes();
  drawParticles();
}

function drawBg(){
  const gE=ctx.createLinearGradient(0,0,0,MID); gE.addColorStop(0,'#1e3d1e'); gE.addColorStop(1,'#2e5c2e');
  ctx.fillStyle=gE; ctx.fillRect(0,0,W,MID);
  const gP=ctx.createLinearGradient(0,MID,0,H); gP.addColorStop(0,'#2e5c2e'); gP.addColorStop(1,'#254a25');
  ctx.fillStyle=gP; ctx.fillRect(0,MID,W,H-MID);
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const gR=ctx.createLinearGradient(0,MID-26,0,MID+26);
  gR.addColorStop(0,'#1a5f80'); gR.addColorStop(0.5,'#1e7aaa'); gR.addColorStop(1,'#1a5f80');
  ctx.fillStyle=gR; ctx.fillRect(0,MID-26,W,52);
  for(let i=0;i<5;i++){
    const wy=MID-14+i*8; ctx.strokeStyle=`rgba(120,220,255,${0.12+i*0.04})`; ctx.lineWidth=2;
    ctx.beginPath(); for(let x=0;x<=W;x+=8){const y=wy+Math.sin((x/22)+(Date.now()/800+i))*3;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.stroke();
  }
  for(const bx of[80,W-128]){
    ctx.fillStyle='#6b4e1e'; ctx.fillRect(bx,MID-26,48,52);
    ctx.strokeStyle='#8b6914'; ctx.lineWidth=2; ctx.strokeRect(bx,MID-26,48,52);
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
    for(let py=MID-22;py<MID+26;py+=7){ctx.beginPath();ctx.moveTo(bx+2,py);ctx.lineTo(bx+46,py);ctx.stroke();}
  }
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5; ctx.setLineDash([10,10]);
  ctx.beginPath(); ctx.moveTo(0,MID); ctx.lineTo(W,MID); ctx.stroke(); ctx.setLineDash([]);
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function drawTower(t){
  if(t.hp<=0){ctx.globalAlpha=0.35;ctx.fillStyle='#555';ctx.beginPath();ctx.arc(t.x,t.y,t.isKing?16:12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;return;}
  const isP=t.team==='player',sz=t.isKing?30:22,col=isP?'#2471a3':'#922b21',lcol=isP?'#85c1e9':'#f1948a';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(t.x,t.y+sz/2+5,sz*0.55,sz*0.2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=col;ctx.strokeStyle=lcol;ctx.lineWidth=2;rr(t.x-sz/2,t.y-sz/2,sz,sz,5);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.12)';rr(t.x-sz/2+2,t.y-sz/2+2,sz-4,sz/2-2,4);ctx.fill();
  if(t.isKing){ctx.font='16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',t.x,t.y-sz/2-10);ctx.textBaseline='alphabetic';}
  const bw=sz+12,bh=5,bx=t.x-bw/2,by=t.y+sz/2+8;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,t.hp/t.maxHp);ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f39c12':'#e74c3c';ctx.fillRect(bx,by,bw*pct,bh);
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff';ctx.font='bold 7px Arial';ctx.textAlign='center';ctx.fillText(Math.ceil(t.hp),t.x,by+bh+8);
}

function drawCannon(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const baseCol = isP ? '#2471a3' : '#922b21';
  const borderCol = isP ? '#5dade2' : '#e74c3c';
  // Base shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+3,hw*0.8,4,0,0,Math.PI*2); ctx.fill();
  // Platform base
  ctx.fillStyle='#555'; ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(t.x-hw,t.y-hh*0.4,t.w,hh*1.4,3); ctx.fill(); ctx.stroke();
  // Cannon barrel (points toward enemy = down for player, up for enemy)
  const barrelDir = isP ? -1 : 1;
  ctx.fillStyle='#333'; ctx.strokeStyle='#666'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.roundRect(t.x-5, t.y+hh*0.2*barrelDir, 10, -hh*1.3*barrelDir, 3);
  ctx.fill(); ctx.stroke();
  // Cannon body circle
  ctx.fillStyle=baseCol; ctx.strokeStyle=borderCol; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(t.x, t.y, hw*0.7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Emoji
  ctx.font='13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💣', t.x, t.y); ctx.textBaseline='alphabetic';
  // Muzzle flash when firing
  if(t.atkCd > 1/t.atkSpd - 0.12){
    ctx.globalAlpha=0.7; ctx.fillStyle='#ffcc00';
    ctx.beginPath(); ctx.arc(t.x, t.y-hh*1.2*barrelDir, 6, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // HP bar
  const bw=t.w+6, bh=3, bx=t.x-bw/2, by=t.y-hh-10;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,t.hp/t.maxHp);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(t.hp), t.x, by-2);
}

function drawGoblinHut(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const pct=Math.max(0,t.hp/t.maxHp);
  const timePct=t.goblinHutTimer/DEFS.goblin_hut.hutDuration;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+3,hw*0.85,4,0,0,Math.PI*2); ctx.fill();
  // Hut body
  const hutCol = isP ? '#1a6b5a' : '#7b3b1e';
  const roofCol = isP ? '#16a085' : '#c0392b';
  ctx.fillStyle=hutCol; ctx.strokeStyle=roofCol; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(t.x-hw,t.y-hh*0.5,t.w,hh*1.5,4); ctx.fill(); ctx.stroke();
  // Roof (triangle)
  ctx.fillStyle=roofCol;
  ctx.beginPath(); ctx.moveTo(t.x-hw-3,t.y-hh*0.5); ctx.lineTo(t.x,t.y-hh-10); ctx.lineTo(t.x+hw+3,t.y-hh*0.5); ctx.closePath(); ctx.fill();
  // Emoji
  ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏚️', t.x, t.y+2); ctx.textBaseline='alphabetic';
  // Active glow when spawning
  if(t.goblinHutActive){
    ctx.globalAlpha=0.22+Math.sin(Date.now()*0.012)*0.1;
    ctx.fillStyle='#16a085';
    ctx.beginPath(); ctx.arc(t.x,t.y,hw*2.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // HP bar
  const bw=t.w+6, bh=3, bx=t.x-bw/2, by=t.y-hh-16;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  // Timer bar (green, below HP bar)
  const tb_y=by+5;
  ctx.fillStyle='#111'; ctx.fillRect(bx,tb_y,bw,bh);
  ctx.fillStyle='#f1c40f'; ctx.fillRect(bx,tb_y,bw*timePct,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(t.goblinHutTimer)+'s', t.x, tb_y-1);
}

function drawInfernoTower(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const pct=Math.max(0,t.hp/t.maxHp);
  const ramp=t.itRamp||0;
  const hasTarget=t.itTarget!==null;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+3,hw*0.85,4,0,0,Math.PI*2); ctx.fill();

  // Glow when firing
  if(hasTarget&&ramp>0.05){
    ctx.globalAlpha=0.12+ramp*0.3;
    const gc=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,hw*3.8);
    const r=ramp>0.7?'255,0,0':ramp>0.4?'255,80,0':'255,140,0';
    gc.addColorStop(0,`rgba(${r},0.9)`); gc.addColorStop(1,`rgba(${r},0)`);
    ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(t.x,t.y,hw*3.8,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Tower base stone
  const baseCol=isP?'#3d1010':'#1e0808';
  const borderCol=ramp>0.7?'#ff0000':ramp>0.35?'#ff5500':'#c0392b';
  ctx.fillStyle=baseCol; ctx.strokeStyle=borderCol; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(t.x-hw,t.y-hh*0.4,t.w,hh*1.6,4); ctx.fill(); ctx.stroke();

  // Top barrel / vent
  ctx.fillStyle='#1a0000'; ctx.strokeStyle=borderCol; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(t.x-hw*0.55,t.y-hh-2,t.w*0.55,hh*0.85,3); ctx.fill(); ctx.stroke();

  // Ember particles in vent
  if(hasTarget&&ramp>0){
    const embCnt=Math.floor(ramp*4)+1;
    for(let i=0;i<embCnt;i++){
      ctx.globalAlpha=0.5+Math.sin(Date.now()*0.02+i)*0.3;
      ctx.fillStyle=ramp>0.5?'#ff2200':'#ff8800';
      ctx.beginPath();
      const ex=t.x+(Math.sin(Date.now()*0.015+i*1.8))*4;
      const ey=t.y-hh-2+(i*(3+ramp*2));
      ctx.arc(ex,ey,1.5+ramp*1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Flame emoji (scales with ramp)
  const fsize=13+Math.round(ramp*9);
  ctx.font=`${fsize}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🔥',t.x,t.y+3); ctx.textBaseline='alphabetic';

  // Beam to locked target
  if(hasTarget&&ramp>0.04){
    const pool=t.team==='player'
      ?[...S.eTroops,...S.eTowers]
      :[...S.pTroops,...S.pTowers];
    const tgt=pool.find(e=>{
      const eid=e.uid!==undefined?e.uid:e.id;
      return eid===t.itTarget&&e.hp>0;
    });
    if(tgt){
      const beamW=1.5+ramp*5.5;
      ctx.globalAlpha=0.35+ramp*0.5;
      ctx.strokeStyle=ramp>0.7?'#ff0000':ramp>0.4?'#ff4400':'#ff9900';
      ctx.lineWidth=beamW;
      ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(t.x,t.y-hh); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
      // White-hot core at high ramp
      if(ramp>0.45){
        ctx.strokeStyle=`rgba(255,240,180,${0.4+ramp*0.4})`;
        ctx.lineWidth=beamW*0.28;
        ctx.beginPath(); ctx.moveTo(t.x,t.y-hh); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
      }
      ctx.lineCap='butt'; ctx.globalAlpha=1;
    }
  }

  // HP bar
  const bw=t.w+6, bh=3, bx=t.x-bw/2, by=t.y-hh-16;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  // Ramp bar (below HP)
  const rb_y=by+5;
  ctx.fillStyle='#2a0000'; ctx.fillRect(bx,rb_y,bw,bh);
  const rampCol=ramp>0.7?'#ff0000':ramp>0.4?'#ff5500':'#ff9900';
  ctx.fillStyle=rampCol; ctx.fillRect(bx,rb_y,bw*ramp,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(t.hp),t.x,by-2);
}

function drawInfernoDragon(t){
  const hw=t.w/2, hh=t.h/2;
  const ramp=t.itRamp||0;
  const hasTarget=t.itTarget!==null;
  const bob=Math.sin(Date.now()*0.005+t.uid)*4;
  const dy=bob;

  // Sombra en el suelo
  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+10,hw*0.9,4,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Glow de rampa
  if(hasTarget&&ramp>0.05){
    ctx.globalAlpha=0.12+ramp*0.32;
    const gc=ctx.createRadialGradient(t.x,t.y+dy,0,t.x,t.y+dy,hw*4);
    const r=ramp>0.7?'255,0,0':ramp>0.4?'255,80,0':'255,140,0';
    gc.addColorStop(0,`rgba(${r},0.9)`); gc.addColorStop(1,`rgba(${r},0)`);
    ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(t.x,t.y+dy,hw*4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Dragón emoji (escala con la rampa levemente)
  const fsize=18+Math.round(ramp*6);
  ctx.font=`${fsize}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐉',t.x,t.y+dy); ctx.textBaseline='alphabetic';

  // Llama pequeña que crece con la rampa
  if(hasTarget&&ramp>0.1){
    const flameSz=8+Math.round(ramp*10);
    ctx.font=`${flameSz}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    // Dirección de la llama hacia el objetivo
    const pool=t.team==='player'
      ?[...S.eTroops,...S.eTowers]
      :[...S.pTroops,...S.pTowers];
    const tgt=pool.find(e=>{
      const eid=e.uid!==undefined?e.uid:e.id;
      return eid===t.itTarget&&e.hp>0;
    });
    if(tgt){
      // Haz desde el dragón al objetivo
      const beamW=1+ramp*4.5;
      ctx.globalAlpha=0.3+ramp*0.55;
      ctx.strokeStyle=ramp>0.7?'#ff0000':ramp>0.4?'#ff4400':'#ff9900';
      ctx.lineWidth=beamW; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(t.x,t.y+dy); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
      if(ramp>0.45){
        ctx.strokeStyle=`rgba(255,240,180,${0.35+ramp*0.4})`;
        ctx.lineWidth=beamW*0.3;
        ctx.beginPath(); ctx.moveTo(t.x,t.y+dy); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
      }
      ctx.lineCap='butt'; ctx.globalAlpha=1;
    }
  }

  // Barra de HP
  const bw=t.w+4, bh=3, bx=t.x-bw/2, by=t.y+dy-hh-12;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,Math.min(1,t.hp/t.maxHp));
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  // Barra de rampa
  const rb_y=by+5;
  ctx.fillStyle='#2a0000'; ctx.fillRect(bx,rb_y,bw,bh);
  const rampCol=ramp>0.7?'#ff0000':ramp>0.4?'#ff5500':'#ff9900';
  ctx.fillStyle=rampCol; ctx.fillRect(bx,rb_y,bw*ramp,bh);
  // Punto de color del equipo
  const isP=t.team==='player';
  ctx.fillStyle=isP?'#3498db':'#e74c3c';
  ctx.beginPath(); ctx.arc(t.x,by-5,3,0,Math.PI*2); ctx.fill();
}

function drawElectricDragon(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const bob=Math.sin(Date.now()*0.004+t.uid*1.3)*4;
  const dy=bob;
  const charging = t.atkCd > 0 ? 1 - (t.atkCd / (1/DEFS.electric_dragon.atkSpd)) : 0;

  // Sombra
  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+10,hw*0.9,4,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Aura eléctrica (pulsa mientras recarga)
  const glowAmt = 0.08 + charging*0.25 + Math.sin(Date.now()*0.02)*0.05;
  ctx.globalAlpha=glowAmt;
  const gc=ctx.createRadialGradient(t.x,t.y+dy,0,t.x,t.y+dy,hw*4.2);
  gc.addColorStop(0,'rgba(52,152,219,0.9)'); gc.addColorStop(1,'rgba(52,152,219,0)');
  ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(t.x,t.y+dy,hw*4.2,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Chispas de carga (aparecen cerca del disparo)
  if(charging > 0.6 && Math.random()<0.4){
    S.particles.push({
      x:t.x+(Math.random()-0.5)*18, y:t.y+dy+(Math.random()-0.5)*18,
      txt:'⚡', col:'#f4d03f', life:0.18, vy:-1.2
    });
  }

  // Dragón emoji
  const fsize=18+Math.round(charging*5);
  ctx.font=`${fsize}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐲',t.x,t.y+dy); ctx.textBaseline='alphabetic';

  // Rayos de cadena (se muestran brevemente tras el ataque)
  if(t.edChainTimer>0 && t.edLastChain && t.edLastChain.length>0){
    const alpha=t.edChainTimer/0.35;
    // Rayo del dragón al primer objetivo
    const first=t.edLastChain[0];
    ctx.globalAlpha=alpha*0.85;
    ctx.strokeStyle='#85c1e9'; ctx.lineWidth=2.5+alpha*2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(t.x,t.y+dy); ctx.lineTo(first.x,first.y); ctx.stroke();
    // Núcleo blanco
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(t.x,t.y+dy); ctx.lineTo(first.x,first.y); ctx.stroke();
    // Rayos entre objetivos de la cadena
    for(let i=1;i<t.edLastChain.length;i++){
      const a=t.edLastChain[i-1], b=t.edLastChain[i];
      // Zigzag eléctrico (3 segmentos intermedios)
      ctx.strokeStyle='#f4d03f'; ctx.lineWidth=1.5+alpha;
      ctx.beginPath(); ctx.moveTo(a.x,a.y);
      const mx1=(a.x+b.x)/2+(Math.random()-0.5)*22, my1=(a.y+b.y)/2+(Math.random()-0.5)*16;
      ctx.quadraticCurveTo(mx1,my1,b.x,b.y); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,200,0.6)'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(a.x,a.y);
      ctx.quadraticCurveTo(mx1,my1,b.x,b.y); ctx.stroke();
      // Destello en cada nodo
      ctx.globalAlpha=alpha*0.9;
      ctx.fillStyle='#f4d03f';
      ctx.beginPath(); ctx.arc(b.x,b.y,3+alpha*2,0,Math.PI*2); ctx.fill();
    }
    // Destello en el primer nodo
    ctx.globalAlpha=alpha*0.9;
    ctx.fillStyle='#85c1e9';
    ctx.beginPath(); ctx.arc(first.x,first.y,4+alpha*2,0,Math.PI*2); ctx.fill();
    ctx.lineCap='butt'; ctx.globalAlpha=1;
  }

  // HP bar
  const bw=t.w+4, bh=3, bx=t.x-bw/2, by=t.y+dy-hh-12;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,Math.min(1,t.hp/t.maxHp));
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  // Barra de recarga (azul eléctrico)
  const rb_y=by+5;
  ctx.fillStyle='#0a1a2a'; ctx.fillRect(bx,rb_y,bw,bh);
  ctx.fillStyle='#3498db'; ctx.fillRect(bx,rb_y,bw*charging,bh);
  ctx.fillStyle=isP?'#3498db':'#e74c3c';
  ctx.beginPath(); ctx.arc(t.x,by-5,3,0,Math.PI*2); ctx.fill();
}

function drawWarriorHealer(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const pct=Math.max(0,t.hp/t.maxHp);
  const wd=DEFS.warrior_healer;
  // Cooldown progress 0→1 (1 = ready to attack)
  const readyPct = t.atkCd > 0 ? 1-(t.atkCd*t.atkSpd) : 1;

  // Sombra
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+2,hw*0.75,hh*0.28,0,0,Math.PI*2); ctx.fill();

  // Aura de curación pulsante (radio = healRadius, muy tenue)
  const pulse=0.5+Math.sin(Date.now()*0.006)*0.5; // 0→1
  ctx.globalAlpha=0.04+pulse*0.07;
  ctx.fillStyle='#2ecc71';
  ctx.beginPath(); ctx.arc(t.x,t.y,wd.healRadius,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.18+pulse*0.1;
  ctx.strokeStyle='#27ae60'; ctx.lineWidth=1.2; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(t.x,t.y,wd.healRadius,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;

  // Cuerpo principal — elipse con gradiente verde
  const bodyG=ctx.createRadialGradient(t.x-hw*0.3,t.y-hh*0.35,0,t.x,t.y,hw*1.1);
  bodyG.addColorStop(0, isP?'#58d68d':'#52be80');
  bodyG.addColorStop(1, isP?'#1e8449':'#145a32');
  ctx.fillStyle=bodyG;
  ctx.strokeStyle=isP?'#82e0aa':'#a9dfbf';
  ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.ellipse(t.x,t.y,hw,hh,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Cruz de curación centrada
  const cr=hw*0.28, ct=hh*0.1;
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.fillRect(t.x-cr,t.y-ct,cr*2,ct*2);       // horizontal
  ctx.fillRect(t.x-ct,t.y-cr,ct*2,cr*2);       // vertical

  // Espada pequeña en la parte inferior
  ctx.font='9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚔️',t.x,t.y+hh*0.55); ctx.textBaseline='alphabetic';

  // Anillo de carga verde (arco que se llena)
  if(readyPct < 1){
    ctx.strokeStyle='rgba(46,204,113,0.55)'; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.arc(t.x,t.y,hw+5,-Math.PI/2,-Math.PI/2+readyPct*Math.PI*2);
    ctx.stroke();
  } else {
    // Lista para atacar: corona de 💚 partículas (solo si está quieta)
    if(Math.random()<0.06){
      const a=Math.random()*Math.PI*2;
      S.particles.push({x:t.x+Math.cos(a)*(hw+8),y:t.y+Math.sin(a)*(hh+8),
        txt:'💚',col:'#2ecc71',life:0.6,vy:-0.9});
    }
  }

  // HP bar
  const bw=t.w+4, bh=3, bx=t.x-bw/2, by=t.y-hh-10;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  ctx.fillStyle=isP?'#27ae60':'#e74c3c';
  ctx.beginPath(); ctx.arc(t.x,by-5,3,0,Math.PI*2); ctx.fill();
}

function drawPekka(t){
  const hw=t.w/2, hh=t.h/2;
  const isP=t.team==='player';
  const pct=Math.max(0,t.hp/t.maxHp);
  // Justo antes de atacar: destello azul oscuro
  const aboutToSwing = t.atkCd > 1/DEFS.pekka.atkSpd - 0.18;

  // Sombra pesada
  ctx.fillStyle='rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+3,hw*1.1,5,0,0,Math.PI*2); ctx.fill();

  // Aura de impacto al atacar
  if(aboutToSwing){
    ctx.globalAlpha=0.35+Math.sin(Date.now()*0.04)*0.15;
    const ag=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,hw*3);
    ag.addColorStop(0,'rgba(80,60,220,0.9)'); ag.addColorStop(1,'rgba(20,10,100,0)');
    ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(t.x,t.y,hw*3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Cuerpo hexagonal de armadura (doble contorno: exterior oscuro + interior azul)
  const sides=6, r=hw*1.05;
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=i/sides*Math.PI*2 - Math.PI/6;
    i===0?ctx.moveTo(t.x+Math.cos(a)*r,t.y+Math.sin(a)*r*1.15)
          :ctx.lineTo(t.x+Math.cos(a)*r,t.y+Math.sin(a)*r*1.15);
  }
  ctx.closePath();
  ctx.fillStyle=isP?'#0d1b6e':'#1a0033';
  ctx.strokeStyle=isP?'#5c6bc0':'#9c27b0';
  ctx.lineWidth=3; ctx.fill(); ctx.stroke();

  // Brillo metálico interior
  const mg=ctx.createRadialGradient(t.x-hw*0.3,t.y-hh*0.4,0,t.x,t.y,hw);
  mg.addColorStop(0,'rgba(160,180,255,0.25)'); mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg;
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=i/sides*Math.PI*2 - Math.PI/6;
    i===0?ctx.moveTo(t.x+Math.cos(a)*r*0.88,t.y+Math.sin(a)*r*0.88*1.15)
          :ctx.lineTo(t.x+Math.cos(a)*r*0.88,t.y+Math.sin(a)*r*0.88*1.15);
  }
  ctx.closePath(); ctx.fill();

  // Visor / ojo rojo brillante
  ctx.fillStyle=isP?'#e040fb':'#ff1744';
  const eyeY=t.y-hh*0.18;
  ctx.beginPath(); ctx.ellipse(t.x,eyeY,hw*0.38,hh*0.18,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.ellipse(t.x-hw*0.1,eyeY-hh*0.04,hw*0.1,hh*0.06,0,0,Math.PI*2); ctx.fill();

  // Emoji grande encima (espada)
  ctx.font='12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🤺',t.x,t.y+hh*0.35); ctx.textBaseline='alphabetic';

  // Destello de espada al golpear
  if(aboutToSwing){
    ctx.globalAlpha=0.75;
    ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const sx=t.x+(isP?hw+6:-(hw+6)), sy=t.y;
    ctx.fillText('⚔️',sx,sy); ctx.textBaseline='alphabetic';
    ctx.globalAlpha=1;
  }

  // HP bar
  const bw=t.w+8,bh=4,bx=t.x-bw/2,by=t.y-hh-14;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=0.5; ctx.strokeRect(bx,by,bw,bh);
  // Punto de equipo + HP numérico
  ctx.fillStyle=isP?'#5c6bc0':'#ab47bc';
  ctx.beginPath(); ctx.arc(t.x,by-5,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(t.hp),t.x,by-2);
}

function drawTroop(t){
  if(t.hp<=0)return;
  if(t.isTesla){ drawTesla(t); return; }
  if(t.isCannon){ drawCannon(t); return; }
  if(t.isGoblinHut){ drawGoblinHut(t); return; }
  if(t.isInfernoTower){ drawInfernoTower(t); return; }
  if(t.isMortar){ drawMortar(t); return; }
  if(t.isInfernoDragon){ drawInfernoDragon(t); return; }
  if(t.isElectricDragon){ drawElectricDragon(t); return; }
  if(t.key==='pekka'){ drawPekka(t); return; }
  if(t.isWarriorHealer){ drawWarriorHealer(t); return; }
  const isP=t.team==='player',hw=t.w/2,hh=t.h/2;

  // Globo: bob animado + sombra en el suelo
  if(t.isBalloon){
    const bob = Math.sin(Date.now()*0.004 + t.uid)*4;
    const drawY = t.y + bob;
    // Sombra
    ctx.globalAlpha=0.25;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(t.x, t.y+hh+6, hw*0.9, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // Cuerda
    ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(t.x, drawY+hh); ctx.lineTo(t.x, t.y+hh+6); ctx.stroke();
    // Globo HP bar
    ctx.fillStyle='#c0392b'; ctx.fillRect(t.x-hw, drawY-hh-7, t.w, 4);
    ctx.fillStyle='#27ae60'; ctx.fillRect(t.x-hw, drawY-hh-7, t.w*(t.hp/t.maxHp), 4);
    // Emoji
    ctx.font='22px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🎈', t.x, drawY); ctx.textBaseline='alphabetic';
    // Bomba colgante
    ctx.font='11px Arial';
    ctx.fillText('💣', t.x, drawY+hh+2);
    return;
  }
  // Bruja Madre: aura de maldición morada
  if(t.isCursed){
    ctx.globalAlpha=0.35+Math.sin(Date.now()*0.008)*0.15;
    const cg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,hw*2.2);
    cg.addColorStop(0,'rgba(180,0,255,0.8)'); cg.addColorStop(1,'rgba(100,0,180,0)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(t.x,t.y,hw*2.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Espíritu: halo pulsante de color al lanzarse
  if(t.isSpirit && !t.spiritTriggered){
    ctx.globalAlpha=0.45+Math.sin(Date.now()*0.014)*0.2;
    const sc=DEFS[t.key].color;
    const sg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,hw*3.5);
    sg.addColorStop(0,sc+'cc'); sg.addColorStop(1,sc+'00');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(t.x,t.y,hw*3.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Congelado: aura de hielo
  if(t.slowTimer>0 && t.slowFactor<=0.1){
    ctx.globalAlpha=0.38+Math.sin(Date.now()*0.007)*0.1;
    const fg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,hw*2.4);
    fg.addColorStop(0,'rgba(100,200,255,0.9)'); fg.addColorStop(1,'rgba(50,150,255,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(t.x,t.y,hw*2.4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  const isGK=t.champion, isWitch=t.isWitch;
  const isDashing=isGK&&(t.dashState==='dashing'||t.dashState==='waiting');
  const isOverheal=isWitch&&t.evolution&&t.hp>t.maxHp; // overheal only for evo version
  
  
  let dy=0, s=1;
  if(t.isMegaKnight && t.jumpState==='jumping'){
    const prog=t.jumpTime/t.jumpMaxTime;
    dy=-(4*65*prog*(1-prog));
    s=1+Math.sin(prog*Math.PI)*0.4;
  }
  const shw=hw*s, shh=hh*s, cy=t.y+dy;

  if(isDashing){
    ctx.globalAlpha=0.3+Math.sin(Date.now()/80)*0.15;
    const g=ctx.createRadialGradient(t.x,cy,0,t.x,cy,shw*2.5);
    g.addColorStop(0,'rgba(255,215,0,0.6)'); g.addColorStop(1,'rgba(255,165,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(t.x,cy,shw*2.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }

  if(isOverheal){
    ctx.globalAlpha=0.25+Math.sin(Date.now()/150)*0.15;
    const g=ctx.createRadialGradient(t.x,cy,0,t.x,cy,shw*2.2);
    g.addColorStop(0,'rgba(180,0,255,0.7)'); g.addColorStop(1,'rgba(100,0,200,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(t.x,cy,shw*2.2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }

  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(t.x,t.y+hh+2,hw*0.7,hh*0.25,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=t.color;
  ctx.strokeStyle=isGK?'#ffd700':isWitch?'#c77dff':(isP?'#5dade2':'#ec7063');
  ctx.lineWidth=(isGK||isWitch||t.isMegaKnight)?2.5:1.5;
  ctx.beginPath(); ctx.ellipse(t.x,cy,shw,shh,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  if(isGK&&isDashing){ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(t.x,cy,shw+4,shh+4,0,0,Math.PI*2);ctx.stroke();}
  if(isWitch&&isOverheal){ctx.strokeStyle='rgba(180,0,255,0.6)';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(t.x,cy,shw+3,shh+3,0,0,Math.PI*2);ctx.stroke();}

  const fs=Math.min(t.w,t.h)*0.75*s;
  drawTroopArt(ctx, t.key, t.art, t.x, cy, fs);

  const bw=t.w+4,bh=3,bx=t.x-bw/2,by=cy-shh-8;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  const pct=Math.max(0,Math.min(1,t.hp/t.maxHp));

  if(isWitch&&isOverheal){
    ctx.fillStyle='#2ecc71'; ctx.fillRect(bx,by,bw,bh);
    const overPct=Math.min(1,(t.hp-t.maxHp)/(t.overhealCap-t.maxHp));
    ctx.fillStyle='#c77dff'; ctx.fillRect(bx,by,bw*overPct,bh);
  } else {
    ctx.fillStyle=isGK?'#f1c40f':isWitch?'#9b59b6':(pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c');
    ctx.fillRect(bx,by,bw*pct,bh);
  }

  ctx.fillStyle=isGK?'#ffd700':isWitch?'#c77dff':(isP?'#3498db':'#e74c3c');
  ctx.beginPath();ctx.arc(t.x,by-5,isGK||isWitch?4:3,0,Math.PI*2);ctx.fill();

  if(isGK&&t.dashState==='dashing'){ctx.fillStyle='#ffd700';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText('×'+t.dashCount,t.x,by-12);}

  // Knight Champion: barra de escudo dorada
  if(t.isKnightChamp && t.shieldHp > 0){
    const sd = DEFS.knight_champion;
    const sPct = Math.max(0, t.shieldHp / sd.knightShieldHp);
    const sw = t.w+4, sh2 = 3, sx2 = t.x-sw/2, sy2 = by-6;
    ctx.fillStyle='#3a2800'; ctx.fillRect(sx2,sy2,sw,sh2);
    ctx.fillStyle='#ffd700'; ctx.fillRect(sx2,sy2,sw*sPct,sh2);
    ctx.strokeStyle='rgba(255,215,0,0.5)'; ctx.lineWidth=0.5; ctx.strokeRect(sx2,sy2,sw,sh2);
    // Escudo aura pulsante
    ctx.globalAlpha=0.18+Math.sin(Date.now()*0.01)*0.08;
    const shg=ctx.createRadialGradient(t.x,cy,0,t.x,cy,shw*2.8);
    shg.addColorStop(0,'rgba(255,215,0,0.6)'); shg.addColorStop(1,'rgba(255,180,0,0)');
    ctx.fillStyle=shg; ctx.beginPath(); ctx.arc(t.x,cy,shw*2.8,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#ffd700'; ctx.font='bold 6px Arial'; ctx.textAlign='center';
    ctx.fillText('🛡'+Math.ceil(t.shieldHp),t.x,sy2-1);
  }

  // Knight Evo: indicador de resistencia a distancia
  if(t.isKnightEvo){
    ctx.globalAlpha=0.6+Math.sin(Date.now()*0.008)*0.15;
    ctx.strokeStyle='#e74c3c'; ctx.lineWidth=1.5;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.arc(t.x,cy,shw+6,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
  }

  if(isWitch){
    const d=DEFS.witch_evo;
    const prog=1-(t.spawnCd/d.spawnInterval);
    ctx.strokeStyle='rgba(180,0,255,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(t.x,cy,shw+7,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
  }

  // Gran Minero: barra de rampa de daño
  if(t.isGranMinero && t.gmRamp > 0){
    const gd = DEFS.gran_minero;
    const rPct = t.gmRamp / gd.dmgRampMax;
    const rw = t.w + 4, rh = 3, rx = t.x - rw/2, ry = by - 5;
    ctx.fillStyle = '#1a0800'; ctx.fillRect(rx, ry, rw, rh);
    const fireCol = rPct > 0.7 ? '#ff2200' : rPct > 0.4 ? '#ff6600' : '#e67e22';
    ctx.fillStyle = fireCol; ctx.fillRect(rx, ry, rw*rPct, rh);
    if(rPct >= 1){ // llamas cuando maxeado
      ctx.font='9px Arial'; ctx.textAlign='center';
      ctx.fillText('🔥', t.x, ry-2);
    }
    // Glow naranja cuando tiene rampa alta
    if(rPct > 0.5){
      ctx.globalAlpha = rPct * 0.3;
      const g = ctx.createRadialGradient(t.x,cy,0,t.x,cy,shw*2);
      g.addColorStop(0,'rgba(255,100,0,0.8)'); g.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(t.x,cy,shw*2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function drawZone(){
  const key=S.pHand[S.selected],def=DEFS[key],anyY=def.type==='spell'?0:MID+28;
  ctx.fillStyle='rgba(255,255,100,0.06)'; ctx.fillRect(0,anyY,W,H-anyY);
  ctx.strokeStyle='rgba(255,220,0,0.5)'; ctx.lineWidth=2; ctx.setLineDash([8,8]);
  ctx.strokeRect(1,anyY,W-2,H-anyY-1); ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,220,0,0.7)'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
  ctx.fillText(def.type==='spell'?'Toca para lanzar':'Toca tu lado para desplegar',W/2,H-12);
}

function drawParticles(){
  for(const p of S.particles){ctx.globalAlpha=Math.min(p.life,1)*0.9;ctx.fillStyle=p.col;ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);}
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════
//  RENDER UI
// ═══════════════════════════════════════════
function renderUI(){
  const row=document.getElementById('elixir-row');
  if(!row._built){row._built=true;const numEl=document.getElementById('elixir-num');for(let i=1;i<=10;i++){const p=document.createElement('div');p.className='e-pip';p.id='ep'+i;row.insertBefore(p,numEl);}}
  const ei=Math.floor(S.elixir); for(let i=1;i<=10;i++) document.getElementById('ep'+i).classList.toggle('on',i<=ei);
  document.getElementById('elixir-num').textContent=ei;
  const mins=Math.floor(S.time/60),secs=Math.floor(S.time%60);
  document.getElementById('timer-box').textContent=`${mins}:${secs.toString().padStart(2,'0')}`;
  for(let i=1;i<=3;i++){document.getElementById('pc'+i).classList.toggle('active',i<=S.pCrowns);document.getElementById('ec'+i).classList.toggle('active',i<=S.eCrowns);}

  // Next card preview
  const nextKey = S.pDeck[0];
  const nPreview = document.getElementById('next-card-preview');
  if(nextKey){
    const nd = DEFS[nextKey];
    nPreview.innerHTML = `<div class="dc-type-bar" style="background:${nd.color}"></div><div class="dc-art" style="font-size:18px">${nd.art}</div><div class="dc-name" style="font-size:6px;color:#f0d080;font-weight:700;text-align:center;padding:0 2px;text-transform:uppercase;letter-spacing:.3px">${nd.name}</div><div class="dc-cost" style="position:absolute;bottom:3px;right:3px;background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:white;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #c77dff">${nd.cost}</div>`;
  }
  const hand=document.getElementById('hand'); hand.innerHTML='';
  S.pHand.forEach((key,idx)=>{
    const def=DEFS[key],isGK=def.champion,isWitch=def.isWitch,isEvo=def.evolution,isLeg=def.legendary;
    const playsLeft = isEvo ? (S.evoCycleMap[key]??0) : 0;
    const playsNeeded = isEvo ? (def.cost<5?8:4) : 0;
    const evoLocked  = isEvo && playsLeft>0;
    const evoReady   = isEvo && playsLeft<=0;
    const locked = def.cost>S.elixir || evoLocked;
    const card=document.createElement('div');
    card.className='card'+(isGK?' champion-card':'')+(isEvo?' evo-card':'')+(isLeg?' legendary-card':'')+(S.selected===idx?' selected':'')+(locked?' locked':'')+(evoLocked?' evo-cycle-locked':'')+(evoReady?' evo-ready':'');
    // Cycle progress bar & overlay
    const cyclePct = isEvo ? Math.max(0,Math.min(1,(playsNeeded-playsLeft)/playsNeeded)) : 0;
    // Display as cycles (round up): cost<5 → 2 total cycles, cost≥5 → 1
    const cyclesTotal = isEvo ? (def.cost<5?2:1) : 0;
    const cyclesLeft  = isEvo ? Math.ceil(playsLeft/(playsNeeded/cyclesTotal)) : 0;
    card.innerHTML=`
      ${isEvo?'<div class="evo-badge">✦ EVO ✦</div>':''}
      <div class="card-type-bar" style="background:${def.color}"></div>
      <div class="card-art">${def.art}</div>
      <div class="card-name">${def.name}</div>
      <div class="card-cost">${def.cost}</div>
      ${evoLocked?`<div class="evo-cycle-overlay"><div class="evo-cycle-icon">⟳</div><div class="evo-cycle-text">${cyclesLeft} ciclo${cyclesLeft!==1?'s':''}</div></div>`:''}
      ${isEvo?`<div class="evo-cycle-bar-wrap"><div class="evo-cycle-bar" style="width:${cyclePct*100}%"></div></div>`:''}`;
    card.onclick=()=>{if(evoLocked||S.gameOver)return;if(locked&&!evoLocked)return;S.selected=(S.selected===idx)?null:idx;};
    hand.appendChild(card);
  });
  renderAbilities();
}

function renderAbilities(){
  const bar = document.getElementById('abilities-bar');
  bar.innerHTML = '';

  // Golden Knight
  if(S.gkAlive && S.gkRef){
    const def = DEFS.golden_knight;
    const onCd = S.gkAbilityCd > 0;
    const isDashing = S.gkRef.dashState==='dashing' || S.gkRef.dashState==='waiting';
    const noElix = S.elixir < def.abilityCost;
    const disabled = onCd || isDashing || noElix;
    const btn = document.createElement('div');
    btn.className = 'champ-ability-btn' + (disabled?' disabled':'');
    btn.innerHTML = `
      <div class="cab-icon">⚡</div>
      <div class="cab-name">🌟 G. Knight</div>
      <div class="cab-label">Dashing Dash</div>
      <div class="cab-cost">${def.abilityCost}</div>
      ${isDashing?'<div class="cab-cd">💛</div>':onCd?`<div class="cab-cd">${Math.ceil(S.gkAbilityCd)}</div>`:''}`;
    btn.onclick = ()=>{ if(S.gameOver||disabled) return; activateDash(); };
    bar.appendChild(btn);
  }

  // Gran Minero
  if(S.gmAlive && S.gmRef){
    const def = DEFS.gran_minero;
    const noElix = S.elixir < def.abilityCost;
    const btn = document.createElement('div');
    btn.className = 'champ-ability-btn gm-btn' + (noElix?' disabled':'');
    btn.innerHTML = `
      <div class="cab-icon">💣</div>
      <div class="cab-name">⛏️ Gran Min.</div>
      <div class="cab-label">Bomba + Carril</div>
      <div class="cab-cost">${def.abilityCost}</div>`;
    btn.onclick = ()=>{ if(S.gameOver||noElix) return; activateGranMinero(S.gmRef); };
    bar.appendChild(btn);
  }

  // Knight Champion
  if(S.kcAlive && S.kcRef){
    const def = DEFS.knight_champion;
    const onCd   = S.kcAbilityCd > 0;
    const noElix = S.elixir < def.abilityCost;
    const hasShield = S.kcRef.shieldHp > 0;
    const disabled  = onCd || noElix || hasShield;
    const btn = document.createElement('div');
    btn.className = 'champ-ability-btn' + (disabled?' disabled':'');
    btn.style.borderColor = hasShield ? '#ffd700' : '';
    btn.style.boxShadow   = hasShield ? '0 0 14px rgba(255,215,0,0.7)' : '';
    btn.innerHTML = `
      <div class="cab-icon">🛡️</div>
      <div class="cab-name">🛡 K.Knight</div>
      <div class="cab-label">Escudo + Taunt</div>
      <div class="cab-cost">${def.abilityCost}</div>
      ${hasShield?`<div class="cab-cd" style="font-size:13px">🛡</div>`:onCd?`<div class="cab-cd">${Math.ceil(S.kcAbilityCd)}</div>`:''}`;
    btn.onclick = ()=>{ if(S.gameOver||disabled) return; activateKnightShield(); };
    bar.appendChild(btn);
  }
}

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
CANVAS.addEventListener('click',e=>{
  if(S.selected===null||S.gameOver)return;
  const r=CANVAS.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const key=S.pHand[S.selected],def=DEFS[key];
  if(def.type!=='spell'&&my<MID+25)return;

  // ── EVO cycle gate ──
  if(def.evolution){
    const playsLeft = S.evoCycleMap[key]??0;
    if(playsLeft>0){
      const cyclesTotal = def.cost<5?2:1;
      const playsNeeded = def.cost<5?8:4;
      const cyclesLeft  = Math.ceil(playsLeft/(playsNeeded/cyclesTotal));
      spark(mx,my-24,'⟳ '+cyclesLeft+' ciclo'+(cyclesLeft!==1?'s':''),'#c77dff');
      sparkle(mx,my,'✦','#a855f7',3);
      return; // block play
    }
  }

  S.elixir-=def.cost;
  const troops=deployCard(key,mx,my,'player');
  if(def.champion&&troops.length>0){
    if(key==='gran_minero'){ S.gmAlive=true; S.gmRef=troops[0]; }
    else if(key==='knight_champion'){ S.kcAlive=true; S.kcRef=troops[0]; }
    else { S.gkAlive=true; S.gkRef=troops[0]; }
  }

  const playedKey=S.pHand[S.selected];

  // ── Decrement cycles for OTHER EVO cards visible in hand ──
  for(let i=0;i<S.pHand.length;i++){
    if(i===S.selected) continue;
    const hk=S.pHand[i], hd=DEFS[hk];
    if(hd && hd.evolution && S.evoCycleMap[hk]!==undefined){
      S.evoCycleMap[hk]=Math.max(0,S.evoCycleMap[hk]-1);
      // Visual flash when EVO becomes ready
      if(S.evoCycleMap[hk]===0) spark(0,0,'✦ EVO LISTA ✦','#c77dff');
    }
  }

  // ── If EVO was played, reset its cycle counter ──
  if(def.evolution){
    S.evoCycleMap[playedKey] = def.cost<5 ? 8 : 4;
    spark(mx,my-30,'✦ EVO ACTIVADA','#c77dff');
  }

  S.pHand.splice(S.selected,1);
  S.pDeck.push(playedKey);
  nextCard(S.pHand,S.pDeck);

  // ── Init cycle counter for newly drawn EVO card if not tracked yet ──
  const newKey=S.pHand[S.pHand.length-1];
  if(newKey){
    const nd=DEFS[newKey];
    if(nd && nd.evolution && !(newKey in S.evoCycleMap)){
      S.evoCycleMap[newKey] = nd.cost<5 ? 8 : 4;
    }
  }

  S.selected=null;
});

// ── TROPHY SYSTEM ──
let playerTrophies = 0;

function showHomeScreen(lastResult){
  // Apply trophy change
  let delta = 0;
  if(lastResult==='player') delta = +30;
  else if(lastResult==='enemy') delta = -28;
  if(delta!==0){
    playerTrophies = Math.max(0, playerTrophies + delta);
    const toast = document.getElementById('hs-result-toast');
    const re = document.getElementById('hs-result-emoji');
    const rl = document.getElementById('hs-result-label');
    const rt = document.getElementById('hs-result-trophies');
    if(lastResult==='player'){
      re.textContent='🏆'; rl.textContent='¡Victoria!'; rl.style.color='#ffd740';
      rt.textContent='+30 🏆'; rt.className='gain';
    } else {
      re.textContent='💀'; rl.textContent='Derrota'; rl.style.color='#ef5350';
      rt.textContent='-28 🏆'; rt.className='loss';
    }
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 3500);
  }
  document.getElementById('hs-trophy-count').textContent = playerTrophies.toLocaleString();
  document.getElementById('home-screen').classList.remove('hidden');
  drawHomeArena();
}

// ── HOME ARENA CANVAS ──
function drawHomeArena(){
  const c = document.getElementById('hs-arena-canvas');
  const x = c.getContext('2d');
  const W2=c.width, H2=c.height;

  // Sky gradient
  const sky=x.createLinearGradient(0,0,0,H2*0.5);
  sky.addColorStop(0,'#1565c0'); sky.addColorStop(1,'#1976d2');
  x.fillStyle=sky; x.fillRect(0,0,W2,H2*0.5);

  // Ground
  const grd=x.createLinearGradient(0,H2*0.5,0,H2);
  grd.addColorStop(0,'#2e7d32'); grd.addColorStop(0.3,'#388e3c'); grd.addColorStop(1,'#1b5e20');
  x.fillStyle=grd; x.fillRect(0,H2*0.5,W2,H2*0.5);

  // River stripe
  const rv=x.createLinearGradient(0,H2*0.48,0,H2*0.56);
  rv.addColorStop(0,'#1565c0'); rv.addColorStop(0.5,'#1976d2'); rv.addColorStop(1,'#1565c0');
  x.fillStyle=rv; x.fillRect(0,H2*0.48,W2,H2*0.08);
  // Bridge
  x.fillStyle='#8d6e63'; x.fillRect(W2/2-20,H2*0.47,40,H2*0.1);
  x.fillStyle='#6d4c41';
  for(let bx=W2/2-18;bx<W2/2+18;bx+=8){ x.fillRect(bx,H2*0.47,6,H2*0.1); }

  // Towers (simplified CR style)
  const drawHSTower = (tx,ty,col,accent,isKing)=>{
    const tw=isKing?36:26, th=isKing?52:42;
    const tg=x.createLinearGradient(tx,ty,tx,ty+th);
    tg.addColorStop(0,accent); tg.addColorStop(1,col);
    x.fillStyle=tg; x.fillRect(tx-tw/2,ty,tw,th);
    x.strokeStyle=accent; x.lineWidth=1.5; x.strokeRect(tx-tw/2,ty,tw,th);
    x.fillStyle=accent;
    for(let m=tx-tw/2+2;m<tx+tw/2-2;m+=7){ x.fillRect(m,ty-5,5,7); }
    x.fillStyle='rgba(0,0,0,0.5)'; x.strokeStyle=accent; x.lineWidth=1;
    x.beginPath(); x.arc(tx,ty+th*0.35,isKing?6:4,0,Math.PI*2); x.fill(); x.stroke();
    if(isKing){ x.font='14px Arial'; x.textAlign='center'; x.fillText('👑',tx,ty+th*0.2); }
    x.fillStyle='rgba(0,0,0,0.6)';
    x.beginPath(); x.roundRect(tx-5,ty+th*0.6,10,th*0.4,3); x.fill();
  };

  // Determine tower color from trophies
  const trophies=playerTrophies;
  const col = trophies<1000?'#6d4c41':trophies<3000?'#37474f':trophies<6000?'#1a237e':'#4a148c';
  const acc = trophies<1000?'#a1887f':trophies<3000?'#78909c':trophies<6000?'#5c6bc0':'#9c27b0';

  // Enemy towers (top)
  drawHSTower(W2*0.22, H2*0.04, '#b71c1c','#ef9a9a', false);
  drawHSTower(W2*0.78, H2*0.04, '#b71c1c','#ef9a9a', false);
  drawHSTower(W2*0.50, H2*0.02, '#c62828','#ffcdd2', true);

  // Player towers (bottom)
  drawHSTower(W2*0.22, H2*0.56, col, acc, false);
  drawHSTower(W2*0.78, H2*0.56, col, acc, false);
  drawHSTower(W2*0.50, H2*0.52, col, acc, true);

  // Balloon decoration (CR mascot)
  x.font='36px Arial'; x.textAlign='center';
  x.fillText('🎈',W2*0.18,H2*0.46);
  x.font='18px Arial';
  x.fillText('🐷',W2*0.18,H2*0.5);

  // Arena name overlay
  x.fillStyle='rgba(0,0,0,0.4)';
  x.beginPath(); x.roundRect(W2/2-60,H2-30,120,22,8); x.fill();
  x.fillStyle='#ffd740'; x.font='bold 10px sans-serif'; x.textAlign='center';
  const arenaName = trophies<1000?'Arena 1 – Cobertizo':trophies<2000?'Arena 3 – Barbárica':
    trophies<4000?'Arena 7 – Pico Corona':trophies<7000?'Arena 11 – Electro Valle':'Arena Legendaria';
  x.fillText(arenaName, W2/2, H2-15);

  // Floating particles
  const now=Date.now();
  for(let i=0;i<6;i++){
    const px=((W2*(i+1)/7 + Math.sin(now*0.001+i)*15))%W2;
    const py=H2*0.1+Math.sin(now*0.0008+i*1.3)*H2*0.08;
    x.globalAlpha=0.3+Math.sin(now*0.002+i)*0.2;
    x.font='10px Arial'; x.fillText('✨',px,py);
  }
  x.globalAlpha=1;
}

// Animate home arena
let hsAnimFrame;
function animateHomeArena(){
  if(!document.getElementById('home-screen').classList.contains('hidden')){
    drawHomeArena();
    hsAnimFrame=requestAnimationFrame(animateHomeArena);
  }
}

// ═══════════════════════════════════════════
//  ASSET LOADER
// ═══════════════════════════════════════════
const ASSETS = {};   // key → HTMLImageElement (cuando cargue)
const ASSETS_LOADED = {};  // key → true/false

(async function loadAssets(){
  let manifest;
  try {
    const res = await fetch('assets-local.json');
    if(!res.ok) throw new Error('no assets-local.json');
    manifest = await res.json();
  } catch {
    try {
      const res = await fetch('assets.json');
      if(!res.ok) throw new Error('no assets.json');
      manifest = await res.json();
    } catch {
      // Sin archivo de assets — todo usará emoji
      console.log('ℹ️ Sin assets.json, usando emojis');
      return;
    }
  }

  const entries = [
    ...Object.entries(manifest.cards || {}),
    ...Object.entries(manifest.ui   || {}),
  ];

  await Promise.all(entries.map(([key, url]) => {
    if(!url) return;
    return new Promise(res => {
      const img = new Image();
      img.onload  = () => { ASSETS[key] = img; ASSETS_LOADED[key] = true;  res(); };
      img.onerror = () => {                     ASSETS_LOADED[key] = false; res(); };
      img.src = url;
    });
  }));

  const n = Object.values(ASSETS_LOADED).filter(Boolean).length;
  console.log(`✅ ${n}/${entries.length} assets cargados`);
})();

// ── Helper: dibuja sprite si existe, si no dibuja emoji ──────────
function drawTroopArt(ctx, key, art, x, y, size) {
  const img = ASSETS[key];
  if(img){
    const hw = size * 0.55;
    ctx.drawImage(img, x - hw, y - hw, hw*2, hw*2);
  } else {
    ctx.font = `${size}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(art, x, y);
    ctx.textBaseline = 'alphabetic';
  }
}

showHomeScreen(null);
animateHomeArena();
