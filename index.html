function deployCard(key,x,y,team,extra){
  const d = DEFS[key];
  if(d.type==='spell'){
    // ── Barril de Duendes: proyectil en arco que desembarca duendes ──
    if(key==='goblin_barrel'){
      const bd=DEFS.goblin_barrel;
      S.barrels.push({x,y,team,delay:bd.barrelDelay,pulse:0,
        fromX: team==='player'? x+(Math.random()-0.5)*40 : x+(Math.random()-0.5)*40,
        fromY: team==='player'? H-30 : 30});
      sparkle(x,y,'🛢️','#16a085',3);
      spark(x,y-18,'🛢️ ¡EN CAMINO!','#1abc9c');
      return [];
    }
    if(key==='barbarian_barrel'){
      const bd=DEFS.barbarian_barrel;
      // El barril rueda hacia adelante (hacia el campo enemigo)
      const dir=team==='player'?-1:1;
      S.rollingBarrels.push({
        x, y, team, dir,
        dist:bd.rollDist, traveled:0,
        spd:bd.rollSpd, angle:0,
        hit:new Set()
      });
      sparkle(x,y,'🪵','#784212',3);
      spark(x,y-18,'💪 ¡A RODAR!','#a04000');
      return [];
    }
    if(key==='the_log'){
      const ld=DEFS.the_log;
      const dir=team==='player'?-1:1;
      S.logs.push({
        x, y, team, dir,
        dist:ld.rollDist, traveled:0,
        spd:ld.rollSpd, angle:0,
        hit:new Set()
      });
      sparkle(x,y,'🌲','#5d4037',4);
      spark(x,y-18,'🌲 ¡TRONCO!','#6d4c41');
      return [];
    }
    if(key==='vine'){
      const vd = DEFS.vine;
      const enemies = team==='player'
        ? [...S.eTroops.filter(t=>t.hp>0), ...S.eTowers.filter(t=>!t.dead&&t.hp>0)]
        : [...S.pTroops.filter(t=>t.hp>0), ...S.pTowers.filter(t=>!t.dead&&t.hp>0)];
      const inRange = enemies
        .filter(e => d2(e.x,e.y,x,y) <= vd.radius)
        .sort((a,b) => b.hp - a.hp)
        .slice(0, vd.maxTargets);
      for(const t of inRange){
        t.vineLocked  = true;
        t.vineWasAir  = !!t.isAir;
        if(t.isAir) t.isAir = false; // tira al suelo las unidades aéreas
      }
      S.vines.push({
        x, y, team,
        radius   : vd.radius,
        targets  : inRange,
        timeLeft : vd.duration,
        damageTicks: [1.5, 0.5], // daño en t=0.5s y t=1.5s restantes
        dmgPerTick : vd.dmgPerTick,
        pulse: 0
      });
      sparkle(x, y, '🌿', '#1e8449', 8);
      spark(x, y-22, '🌿 ENREDADERA!', '#27ae60');
      return [];
    }
    // Terremoto: zona persistente de ticks
    if(key==='earthquake'){
      S.earthquakes.push({x, y, team, radius:d.radius, timeLeft:d.duration,
        tickCd:0, tickRate:d.tickRate,
        dmgTroop:d.dmgTroop, dmgBuilding:d.dmgBuilding,
        slowFactor:d.slowFactor, slowDur:d.slowDur});
      sparkle(x, y, '🌍', '#8B4513', 6);
      spark(x, y-20, '🌍 TERREMOTO!', '#c0392b');
      return [];
    }
    const enemies = team==='player'?[...S.eTroops,...S.eTowers]:[...S.pTroops,...S.pTowers];
    for(const t of enemies){
      if(t.hp<=0)continue;
      if(d2(t.x,t.y,x,y)<=d.radius){
        const dm=Math.round(d.dmg*(t.isKing!==undefined?0.5:1));
        t.hp-=dm; spark(t.x,t.y-10,'-'+dm,'#ff5500');
        if(t.isKing===undefined && !t.id){ applyKnockback(t, x, y, 120, 0.2); }
      }
    }
    sparkle(x,y,d.art,'#ff6600',6); return [];
  }
  const n=d.count||1, arr=team==='player'?S.pTroops:S.eTroops, out=[];

  // Puerquitos: split de carril si se despliegan cerca del centro
  if(d.isRoyalHogs && n===4){
    const nearCenter = x > W*0.3 && x < W*0.7;
    const positions = nearCenter
      ? [ // 2 por carril izquierdo, 2 por derecho
          {ox:-W*0.22, oy:0}, {ox:-W*0.22, oy:14},
          {ox: W*0.22, oy:0}, {ox: W*0.22, oy:14}]
      : [ // todos juntos en el lado donde se pusieron
          {ox:-18, oy:0}, {ox:18, oy:0},
          {ox:-10, oy:14},{ox:10, oy:14}];
    for(const {ox,oy} of positions){
      const t=mkTroop('royal_hogs', x+ox, y+oy, team);
      arr.push(t); out.push(t);
    }
    sparkle(x, y, '🐷', '#e91e8c', 4);
    return out;
  }
  for(let i=0;i<n;i++){
    const ox=(i-(n-1)/2)*22, oy=i%2===0?0:12;
    const t=mkTroop(key,x+ox,y+oy,team,extra);
    arr.push(t); out.push(t);
    
    // MK Spawn Damage
    if(key==='megaknight'){
      doAoEDamage(t.x, t.y, DEFS.megaknight.splashRadius, DEFS.megaknight.dmg, team, 200);
      spark(t.x, t.y-30, '💥 SPAWN!', '#ffffff');
    }
  }
  return out;
}

function witchSpawn(witch){
  const arr = witch.team==='player'?S.pTroops:S.eTroops;
  const offsets = [{ox:-28,oy:0},{ox:28,oy:0},{ox:0,oy:-24},{ox:0,oy:24}];
  for(const {ox,oy} of offsets){
    const sk = mkTroop('goblins', witch.x+ox, witch.y+oy, witch.team);
    sk.art='💀'; sk.color='#bdc3c7'; sk.hp=75; sk.maxHp=75;
    sk.dmg=55; sk.range=36; sk.spd=1.5; sk.atkSpd=1.0;
    sk.w=10; sk.h=13; sk.witchOwner=witch.uid;
    arr.push(sk);
  }
  sparkle(witch.x,witch.y,'💀','#c39bd3',4);
}

function onTroopDeath(t, arr, theirArr){
  // Globo: daño de muerte en área al caer
  if(t.isBalloon){
    const bd = DEFS.balloon;
    doAoEDamage(t.x, t.y, bd.deathRadius, bd.deathDmg, t.team, 0);
    sparkle(t.x, t.y, '💥', '#ff4400', 8);
    spark(t.x, t.y-22, '💥 BOOM!', '#ff2200');
  }

  // ── Gólem de Piedra: explota y genera 2 Golemitos ──
  if(t.isGolem){
    const gd = DEFS.golem;
    doAoEDamage(t.x, t.y, gd.deathRadius, gd.deathDmg, t.team, 80);
    sparkle(t.x, t.y, '💥', '#95a5a6', 10);
    spark(t.x, t.y-28, '💥 GOLEMITOS!', '#7f8c8d');
    const myArr2 = t.team==='player' ? S.pTroops : S.eTroops;
    const g1 = mkTroop('golemite', t.x-20, t.y, t.team);
    const g2 = mkTroop('golemite', t.x+20, t.y, t.team);
    myArr2.push(g1, g2);
  }

  // ── Golemito: pequeña explosión de muerte ──
  if(t.isGolemite){
    const gd = DEFS.golemite;
    doAoEDamage(t.x, t.y, gd.deathRadius, gd.deathDmg, t.team, 40);
    sparkle(t.x, t.y, '💢', '#bdc3c7', 5);
  }

  // ── Gólem de Elixir (grande): genera 2 medianos, regala 0.5 elixir al rival ──
  if(t.isElixirGolem){
    sparkle(t.x, t.y, '💧', '#9b59b6', 8);
    spark(t.x, t.y-28, '💧 +0.5 RIVAL', '#9b59b6');
    // Dar elixir al equipo contrario
    if(t.team==='player'){ S.aiElixir = Math.min(10, S.aiElixir+0.5); }
    else { S.elixir = Math.min(10, S.elixir+0.5); }
    const myArr2 = t.team==='player' ? S.pTroops : S.eTroops;
    const m1 = mkTroop('elixir_golem_med', t.x-18, t.y, t.team);
    const m2 = mkTroop('elixir_golem_med', t.x+18, t.y, t.team);
    myArr2.push(m1, m2);
  }

  // ── Gólem de Elixir (mediano): genera 2 pequeños, regala 0.5 elixir al rival ──
  if(t.isElixirGolemMed){
    sparkle(t.x, t.y, '🫐', '#8e44ad', 5);
    spark(t.x, t.y-20, '💧 +0.5 RIVAL', '#8e44ad');
    if(t.team==='player'){ S.aiElixir = Math.min(10, S.aiElixir+0.5); }
    else { S.elixir = Math.min(10, S.elixir+0.5); }
    const myArr2 = t.team==='player' ? S.pTroops : S.eTroops;
    const s1 = mkTroop('elixir_golem_small', t.x-12, t.y, t.team);
    const s2 = mkTroop('elixir_golem_small', t.x+12, t.y, t.team);
    myArr2.push(s1, s2);
  }

  // ── Gólem de Elixir (pequeño): último suspiro, regala 0.5 elixir al rival ──
  if(t.isElixirGolemSmall){
    sparkle(t.x, t.y, '🔵', '#7d3c98', 3);
    spark(t.x, t.y-16, '💧 +0.5 RIVAL', '#7d3c98');
    if(t.team==='player'){ S.aiElixir = Math.min(10, S.aiElixir+0.5); }
    else { S.elixir = Math.min(10, S.elixir+0.5); }
  }

  if(t.isCursed){
    // El cerdito va al equipo de la bruja madre (enemigo del muerto)
    const pigTeam = t.team === 'player' ? 'enemy' : 'player';
    const pigArr  = pigTeam === 'player' ? S.pTroops : S.eTroops;
    const pig = mkTroop('hog_rider', t.x, t.y, pigTeam);
    // Cerdito pequeño y débil
    pig.art='🐷'; pig.hp=400; pig.maxHp=400;
    pig.dmg=80; pig.spd=1.5; pig.w=13; pig.h=16;
    pig.pref='building'; pig.isCursedPig=true;
    pigArr.push(pig);
    sparkle(t.x, t.y, '🐷', '#8e44ad', 4);
    spark(t.x, t.y-18, '🧟 MALDICIÓN!', '#c77dff');
  }

  if(!t.witchOwner) return;
  const witch = arr.find(w=>w.uid===t.witchOwner&&w.hp>0);
  if(!witch) return;
  const wDef = DEFS[witch.defKey]||DEFS.witch_evo;
  if(!wDef.healPerSkeleton) return; // base witch — no healing
  const cap = witch.maxHp * (wDef.overhealCap||1);
  witch.hp = Math.min(cap, witch.hp + wDef.healPerSkeleton);
  S.particles.push({x:witch.x,y:witch.y-20,txt:'+'+wDef.healPerSkeleton,col:'#c77dff',life:1.2,vy:-0.8});
  S.particles.push({x:witch.x+(Math.random()-0.5)*20,y:witch.y+(Math.random()-0.5)*20,txt:'💜',col:'#c77dff',life:0.5,vy:-1});
}

// ═══════════════════════════════════════════
//  GOLDEN KNIGHT — DASHING DASH
// ═══════════════════════════════════════════
function activateDash(){
  if(!S.gkAlive||!S.gkRef||S.gkRef.hp<=0||S.gkAbilityCd>0||S.elixir<1)return;
  const gk=S.gkRef;
  if(gk.dashState!=='idle')return;
  S.elixir-=1;
  gk.dashState='waiting'; gk.dashDelay=1.0; gk.dashCount=0;
  spark(gk.x,gk.y-32,'⚡ DASHING DASH!','#ffd700');
}

function updateDash(gk,dt){
  const d=DEFS.golden_knight;
  if(gk.dashState==='waiting'){
    gk.dashDelay-=dt;
    if(Math.floor(gk.dashDelay*10)%2===0)
      S.particles.push({x:gk.x+(Math.random()-0.5)*28,y:gk.y+(Math.random()-0.5)*18,txt:'✨',col:'#ffd700',life:0.35,vy:-1.2});
    if(gk.dashDelay<=0) startNextDash(gk);
    return true;
  }
  if(gk.dashState==='dashing'){
    gk.invuln=true;
    const tgt=gk.dashTarget;
    if(!tgt||tgt.hp<=0){endDash(gk);return true;}
    const dx=tgt.x-gk.x,dy=tgt.y-gk.y,dist=Math.sqrt(dx*dx+dy*dy),spd=400*dt;
    S.particles.push({x:gk.x,y:gk.y,txt:'💛',col:'#ffd700',life:0.25,vy:0});
    if(dist<=spd||dist<=gk.range){
      const dmg=Math.round(gk.dmg*d.dashDmgMult);
      tgt.hp-=dmg;
      spark(tgt.x,tgt.y-14,'💥-'+dmg,'#ffd700');
      sparkle(tgt.x,tgt.y,'⚡','#f1c40f',3);
      gk.dashCount++;
      if(gk.dashCount>=d.maxDashes||tgt.isKing!==undefined){endDash(gk);return true;}
      startNextDash(gk);
    } else {
      gk.x+=dx/dist*spd; gk.y+=dy/dist*spd;
      gk.x=Math.max(14,Math.min(W-14,gk.x));
      gk.y=Math.max(14,Math.min(H-14,gk.y));
    }
    return true;
  }
  return false;
}

function startNextDash(gk){
  const d=DEFS.golden_knight;
  const enemies=gk.team==='player'
    ?[...S.eTroops.filter(t=>t.hp>0),...S.eTowers.filter(t=>t.hp>0)]
    :[...S.pTroops.filter(t=>t.hp>0),...S.pTowers.filter(t=>t.hp>0)];
  let best=null,bestD=Infinity;
  for(const e of enemies){const dist=d2(gk.x,gk.y,e.x,e.y);if(dist<=d.dashRange&&dist<bestD){bestD=dist;best=e;}}
  if(!best){endDash(gk);return;}
  gk.dashTarget=best; gk.dashState='dashing';
}

function endDash(gk){
  gk.dashState='idle'; gk.dashTarget=null; gk.invuln=false; gk.dashCount=0;
  S.gkAbilityCd=DEFS.golden_knight.abilityCd;
  sparkle(gk.x,gk.y,'⭐','#ffd700',5);
}

// ═══════════════════════════════════════════
//  KNIGHT CHAMPION — ESCUDO + TAUNT
// ═══════════════════════════════════════════
function activateKnightShield(){
  if(!S.kcAlive||!S.kcRef||S.kcRef.hp<=0)return;
  if(S.kcAbilityCd>0||S.elixir<DEFS.knight_champion.abilityCost)return;
  if(S.kcRef.shieldHp>0)return; // ya tiene escudo activo
  const kc = S.kcRef;
  const kd = DEFS.knight_champion;
  S.elixir -= kd.abilityCost;
  kc.shieldHp = kd.knightShieldHp;
  // Provocar a todos los enemigos en el radio
  const enemies = kc.team==='player' ? S.eTroops : S.pTroops;
  let taunted = 0;
  for(const e of enemies){
    if(e.hp<=0)continue;
    if(d2(kc.x, kc.y, e.x, e.y) <= kd.tauntRadius){
      e.tauntTarget = kc.uid;
      e.tauntTimer  = kd.tauntDur;
      taunted++;
    }
  }
  S.kcAbilityCd = kd.abilityCd;
  sparkle(kc.x, kc.y, '🛡️', '#ffd700', 8);
  spark(kc.x, kc.y-32, '🛡 ESCUDO!', '#ffd700');
  if(taunted>0) spark(kc.x, kc.y-46, '⚠ ×'+taunted+' PROVOCADOS', '#ff8800');
}

// ═══════════════════════════════════════════
//  ESPÍRITUS — EFECTOS AL IMPACTAR
// ═══════════════════════════════════════════
function triggerSpiritEffect(spirit, target, myArr, theirArr, theirTowers){
  const d = DEFS[spirit.key];
  const team = spirit.team;
  const cx = target.x, cy = target.y;
  const enemyPool = [...theirArr.filter(e=>e.hp>0), ...theirTowers.filter(t=>t.hp>0)];

  if(spirit.isFireSpirit){
    doAoEDamage(cx, cy, d.splashR, d.dmg, team, 90);
    sparkle(cx, cy, '🔥', '#ff4400', 10);
    spark(cx, cy-24, '🔥 ¡BOOM!', '#e74c3c');
  }

  if(spirit.isElectricSpirit){
    // Cadena BFS hasta chainCount enemigos
    const hit = new Set();
    const chainTargets = [];
    const getEid = e => e.uid!==undefined ? e.uid : e.id;
    hit.add(getEid(target));
    target.hp -= d.dmg;
    spark(target.x, target.y-14, '-'+d.dmg, '#f4d03f');
    chainTargets.push(target);
    let cur = target;
    while(chainTargets.length < d.chainCount){
      let next=null, nextD=Infinity;
      for(const e of enemyPool){
        const eid=getEid(e); if(hit.has(eid)) continue;
        const dd=d2(cur.x,cur.y,e.x,e.y);
        if(dd<=d.chainRange&&dd<nextD){nextD=dd;next=e;}
      }
      if(!next) break;
      hit.add(getEid(next));
      next.hp -= d.dmg;
      spark(next.x, next.y-14, '-'+d.dmg, '#f4d03f');
      chainTargets.push(next);
      cur = next;
    }
    // Aturdir (freeze breve) y reiniciar ataques aliados cercanos
    for(const ct of chainTargets){ ct.slowTimer=0.5; ct.slowFactor=0.05; }
    for(const a of myArr){ if(a.uid!==spirit.uid&&a.hp>0&&d2(a.x,a.y,cx,cy)<=90) a.atkCd=0; }
    // Partículas de cadena entre targets
    for(let i=1;i<chainTargets.length;i++){
      const pv=chainTargets[i-1],cv2=chainTargets[i];
      for(let j=0;j<4;j++){
        const f=j/3;
        S.particles.push({x:pv.x+(cv2.x-pv.x)*f+(Math.random()-0.5)*10,
          y:pv.y+(cv2.y-pv.y)*f+(Math.random()-0.5)*10,
          txt:'⚡',col:'#f4d03f',life:0.35,vy:-0.4});
      }
    }
    sparkle(cx, cy, '⚡', '#f4d03f', 8);
    spark(cx, cy-26, '⚡ CADENA × '+chainTargets.length, '#f4d03f');
  }

  if(spirit.isIceSpirit){
    // Congelar enemigos en área
    for(const e of enemyPool){
      if(d2(e.x,e.y,cx,cy)<=d.splashR){
        e.hp -= d.dmg;
        e.slowTimer=d.freezeDur; e.slowFactor=0;
        sparkle(e.x,e.y,'❄️','#aed6f1',2);
        spark(e.x,e.y-10,'-'+d.dmg,'#5dade2');
      }
    }
    // Reiniciar ataques aliados cercanos
    for(const a of myArr){ if(a.uid!==spirit.uid&&a.hp>0&&d2(a.x,a.y,cx,cy)<=d.splashR+22) a.atkCd=0; }
    sparkle(cx,cy,'❄️','#aed6f1',12);
    spark(cx,cy-26,'❄️ ¡CONGELADO!','#5dade2');
  }

  if(spirit.isHealingSpirit){
    const allies = myArr.filter(a=>a.uid!==spirit.uid&&a.hp>0);
    let anyHealed = false;
    for(const a of allies){
      if(d2(a.x,a.y,cx,cy)<=d.splashR){
        const healAmt=Math.min(d.healAmount, a.maxHp-a.hp);
        if(healAmt>0){
          a.hp+=healAmt;
          S.particles.push({x:a.x+(Math.random()-0.5)*12,y:a.y-12,
            txt:'+'+Math.round(healAmt),col:'#2ecc71',life:1.3,vy:-0.7});
          sparkle(a.x,a.y,'💚','#2ecc71',3);
          anyHealed=true;
        }
      }
    }
    sparkle(cx,cy,'💚','#27ae60',12);
    spark(cx,cy-26,anyHealed?'💚 ¡CURACIÓN!':'💚 AURA','#2ecc71');
  }
}

// ═══════════════════════════════════════════
//  AI
// ═══════════════════════════════════════════
function aiStep(dt){
  S.aiCd -= dt; if(S.aiCd > 0) return;

  const elixir = Math.floor(S.aiElixir);
  const aff = S.eHand.filter(k => DEFS[k].cost <= elixir && !DEFS[k].champion && !DEFS[k].evolution);
  if(!aff.length){ S.aiCd = 0.3; return; }

  // — Lectura del campo —
  const threats     = S.pTroops.filter(t => t.hp > 0 && t.y < MID + 60);
  const bigThreats  = threats.filter(t => t.y < MID - 20 || t.hp > 1000);
  const towerFire   = S.eTowers.some(tw => !tw.dead && tw.hp > 0 &&
                        S.pTroops.some(t => t.hp > 0 && d2(t.x,t.y,tw.x,tw.y) < 100));
  const myAlive     = S.eTroops.filter(t => t.hp > 0).length;
  const isEmergency = towerFire || bigThreats.length > 0;
  const isThreat    = threats.length > 0;

  // — Selección de carta —
  let key = null;

  if(isEmergency){
    // Jugar lo más barato y rápido posible para bloquear
    const sorted = [...aff].sort((a,b) => DEFS[a].cost - DEFS[b].cost);
    key = sorted[0];
  } else if(isThreat && aff.some(k => DEFS[k].type === 'spell') && threats.length >= 2){
    // Spell sobre aglomeración
    key = aff.find(k => DEFS[k].type === 'spell');
  } else if(isThreat){
    // Counter con tropa de rango o tanque
    const good = aff.filter(k => DEFS[k].type !== 'spell' && (DEFS[k].range > 80 || DEFS[k].hp > 1000));
    key = good.length ? good[Math.floor(Math.random()*good.length)]
                      : aff.filter(k => DEFS[k].type !== 'spell')[0] || aff[0];
  } else if(elixir >= 6){
    // Ataque: siempre deploar si tiene 6+ elixir
    const heavy = aff.filter(k => DEFS[k].type !== 'spell' && DEFS[k].cost >= 3);
    key = heavy.length ? heavy[Math.floor(Math.random()*heavy.length)] : aff[Math.floor(Math.random()*aff.length)];
  } else if(elixir >= 4 && myAlive < 5){
    // Ataque normal si tiene pocas tropas
    key = aff.filter(k => DEFS[k].type !== 'spell')[Math.floor(Math.random()*aff.filter(k=>DEFS[k].type!=='spell').length)]
       || aff[0];
  }

  if(!key){ S.aiCd = 0.4; return; }

  S.aiElixir -= DEFS[key].cost;
  const def = DEFS[key];

  // — Posición —
  let x, y;
  if(def.type === 'spell'){
    if(threats.length > 0){
      const cx = threats.reduce((s,t)=>s+t.x,0)/threats.length;
      const cy = threats.reduce((s,t)=>s+t.y,0)/threats.length;
      x = cx + (Math.random()-0.5)*30; y = cy + (Math.random()-0.5)*20;
    } else {
      x = W/2 + (Math.random()-0.5)*100; y = MID - 50 - Math.random()*60;
    }
  } else if(isEmergency || isThreat){
    // Defender: colocar entre la amenaza y nuestra torre
    const t = (bigThreats.length ? bigThreats : threats).sort((a,b)=>a.y-b.y)[0];
    x = t.x + (Math.random()-0.5)*55;
    y = Math.max(55, Math.min(MID - 10, t.y - 25 + (Math.random()-0.5)*35));
    x = Math.max(20, Math.min(W-20, x));
  } else {
    // Atacar por el lado menos defendido del jugador
    const leftP  = S.pTroops.filter(t=>t.hp>0&&t.x<W/2).length;
    const rightP = S.pTroops.filter(t=>t.hp>0&&t.x>=W/2).length;
    const goLeft = leftP <= rightP;
    x = goLeft ? 45+Math.random()*80 : W-45-Math.random()*80;
    y = 55 + Math.random()*75;
  }

  deployCard(key, x, y, 'enemy');
  const idx = S.eHand.indexOf(key);
  S.eHand.splice(idx,1);
  S.eDeck.push(key);
  nextCard(S.eHand, S.eDeck);

  S.aiCd = isEmergency ? 0.3 + Math.random()*0.5
         : isThreat    ? 0.6 + Math.random()*0.8
         :               1.0 + Math.random()*1.5;
}

// ═══════════════════════════════════════════
//  UPDATE TROOPS
// ═══════════════════════════════════════════
function updateTroops(myArr,theirArr,theirTowers,dt){
  for(const t of myArr){
    if(t.hp<=0)continue;

    // Enredadera: tropa congelada, no se mueve ni ataca
    if(t.vineLocked) continue;

    // Decrementar slow/freeze timer
    if(t.slowTimer > 0) t.slowTimer = Math.max(0, t.slowTimer - dt);

    // ── Espíritus: se lanzan al objetivo y explotan ──
    if(t.isSpirit && !t.spiritTriggered){
      let spiritTarget = null, spiritBestD = Infinity;
      // Todos los espíritus (incluido el sanador) vuelan hacia el enemigo más cercano.
      // Al explotar, el sanador cura aliados en el área desde triggerSpiritEffect.
      for(const e of theirArr){if(e.hp<=0)continue;const dd=d2(t.x,t.y,e.x,e.y);if(dd<spiritBestD){spiritBestD=dd;spiritTarget=e;}}
      if(!spiritTarget) for(const tw of theirTowers){if(tw.hp<=0)continue;const dd=d2(t.x,t.y,tw.x,tw.y);if(dd<spiritBestD){spiritBestD=dd;spiritTarget=tw;}}
      if(!spiritTarget){t.hp=0;continue;}
      const spd=220;
      const sdx=spiritTarget.x-t.x,sdy=spiritTarget.y-t.y;
      const sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      // Partícula de estela
      if(Math.random()<0.4) S.particles.push({x:t.x+(Math.random()-0.5)*8,y:t.y+(Math.random()-0.5)*8,txt:t.art,col:DEFS[t.key].color,life:0.3,vy:-0.6});
      if(sdist<=DEFS[t.key].range||sdist<=spd*dt+4){
        t.spiritTriggered=true;
        triggerSpiritEffect(t,spiritTarget,myArr,theirArr,theirTowers);
        t.hp=0;
      } else {
        t.x+=sdx/sdist*spd*dt;
        t.y+=sdy/sdist*spd*dt;
        t.x=Math.max(10,Math.min(W-10,t.x));
        t.y=Math.max(10,Math.min(H-10,t.y));
      }
      continue;
    }

    // ── Choza de Duendes: genera duendes cuando hay enemigos cerca ──
    if(t.isGoblinHut){
      t.goblinHutTimer -= dt;
      if(t.goblinHutTimer <= 0){ t.hp = 0; continue; }
      const nearEnemies = [...theirArr, ...theirTowers].filter(e=>e.hp>0 && d2(t.x,t.y,e.x,e.y)<=t.range);
      t.goblinHutActive = nearEnemies.length > 0;
      if(t.goblinHutActive){
        t.goblinHutSpawnCd -= dt;
        if(t.goblinHutSpawnCd <= 0){
          const myArr2 = t.team==='player' ? S.pTroops : S.eTroops;
          const ang = Math.random()*Math.PI*2;
          const sg = mkTroop('spear_goblins', t.x+Math.cos(ang)*22, t.y+Math.sin(ang)*22, t.team);
          sg.count = 1; // individual
          myArr2.push(sg);
          t.goblinHutSpawnCd = DEFS.goblin_hut.spawnInterval;
          sparkle(t.x, t.y, '🗡️', '#16a085', 3);
        }
      } else {
        // Reset spawn CD when no enemies (builds up tension)
        t.goblinHutSpawnCd = Math.max(0, t.goblinHutSpawnCd - dt);
      }
      continue;
    }

    // ── Mortero: dispara proyectil parabólico a larga distancia ──
    if(t.isMortar){
      if(t.atkCd>0){t.atkCd-=dt;continue;}
      const md=DEFS.mortar;
      let best=null,bestD=Infinity;
      for(const e of theirArr){
        if(e.hp<=0||e.isAir||e.teslaHidden)continue;
        const dd=d2(t.x,t.y,e.x,e.y);
        if(dd>=md.minRange&&dd<=md.range&&dd<bestD){bestD=dd;best=e;}
      }
      if(!best){
        for(const tw of theirTowers){
          if(tw.hp<=0)continue;
          const dd=d2(t.x,t.y,tw.x,tw.y);
          if(dd>=md.minRange&&dd<=md.range&&dd<bestD){bestD=dd;best=tw;}
        }
      }
      if(!best){continue;}
      // Predecir posición futura del objetivo
      const pred=best.spd>0?md.shellFallTime:0;
      const ang=Math.atan2(best.y-t.y,best.x-t.x);
      const tx=best.x+Math.cos(ang)*best.spd*55*pred;
      const ty=best.y+Math.sin(ang)*best.spd*55*pred;
      S.mortarShells.push({
        fromX:t.x,fromY:t.y,tx,ty,
        elapsed:0,fallTime:md.shellFallTime,
        dmg:t.dmg,splashR:md.splashR,team:t.team
      });
      t.atkCd=1/md.atkSpd;
      spark(t.x,t.y-18,'💥','#6d4c41');
      // Animación cañón
      S.particles.push({x:t.x,y:t.y-16,txt:'💨',col:'#aaa',life:0.3,vy:-2});
      continue;
    }
    if(t.isInfernoTower){
      let best=null, bestD=Infinity;
      for(const e of theirArr){
        if(e.hp<=0||e.teslaHidden)continue;
        if(e.isAir && !t.targetsAir)continue;
        const dd=d2(t.x,t.y,e.x,e.y);
        if(dd<=t.range&&dd<bestD){bestD=dd;best=e;}
      }
      if(!best) for(const tw of theirTowers){
        if(tw.hp<=0)continue;
        const dd=d2(t.x,t.y,tw.x,tw.y);
        if(dd<=t.range&&dd<bestD){bestD=dd;best=tw;}
      }
      if(!best){t.itRamp=0;t.itTarget=null;continue;}
      const tid=best.uid!==undefined?best.uid:best.id;
      if(t.itTarget!==tid){t.itTarget=tid;t.itRamp=0;}
      const itd=DEFS.inferno_tower;
      t.itRamp=Math.min(1,t.itRamp+dt/itd.itRampTime);
      const ease=t.itRamp*t.itRamp;
      const dps=itd.itDpsMin+(itd.itDpsMax-itd.itDpsMin)*ease;
      const dmgThisFrame=Math.max(1,Math.round(dps*dt));
      const dmgApplied=Math.round(dmgThisFrame*(best.isKing!==undefined?0.5:1));
      applyDmgToTarget(best, dmgApplied, true);
      if(Math.random()<dt*10){
        const col=t.itRamp>0.7?'#ff0000':t.itRamp>0.4?'#ff4400':'#ff8800';
        spark(best.x+(Math.random()-0.5)*12,best.y+(Math.random()-0.5)*12,'-'+dmgApplied,col);
      }
      // Partículas de llama
      if(Math.random()<dt*15){
        S.particles.push({x:best.x+(Math.random()-0.5)*18,y:best.y+(Math.random()-0.5)*18,
          txt:'🔥',col:'#ff4400',life:0.25,vy:-1.5});
      }
      continue;
    }

    // ── Dragón Infernal: tropa aérea con haz de rampa ──
    if(t.isInfernoDragon){
      // Moverse hacia el objetivo más cercano (lógica de aire)
      let best=null, bestD=Infinity;
      for(const e of theirArr){
        if(e.hp<=0||e.teslaHidden)continue;
        if(e.isAir && !t.targetsAir)continue;
        const dd=d2(t.x,t.y,e.x,e.y);
        if(dd<bestD){bestD=dd;best=e;}
      }
      if(!best) for(const tw of theirTowers){
        if(tw.hp<=0)continue;
        const dd=d2(t.x,t.y,tw.x,tw.y);
        if(dd<bestD){bestD=dd;best=tw;}
      }
      if(!best){t.itRamp=0;t.itTarget=null;continue;}

      // Desplazarse si fuera de rango
      const spd=t.spd*(t.slowTimer>0?t.slowFactor||1:1);
      if(bestD>t.range){
        const a=Math.atan2(best.y-t.y,best.x-t.x);
        t.x+=Math.cos(a)*spd*55*dt; t.y+=Math.sin(a)*spd*55*dt;
        t.x=Math.max(10,Math.min(W-10,t.x)); t.y=Math.max(10,Math.min(H-10,t.y));
        // Cambiar de objetivo reinicia la rampa
        const tid=best.uid!==undefined?best.uid:best.id;
        if(t.itTarget!==tid){t.itTarget=tid;t.itRamp=0;}
        // Rampa no sube mientras viaja (fuera de rango)
        continue;
      }

      // Dentro de rango: haz de rampa
      const tid=best.uid!==undefined?best.uid:best.id;
      if(t.itTarget!==tid){t.itTarget=tid;t.itRamp=0;}
      const itd=DEFS.inferno_dragon;
      t.itRamp=Math.min(1,t.itRamp+dt/itd.itRampTime);
      const ease=t.itRamp*t.itRamp;
      const dps=itd.itDpsMin+(itd.itDpsMax-itd.itDpsMin)*ease;
      const dmgThisFrame=Math.max(1,Math.round(dps*dt));
      const dmgApplied=Math.round(dmgThisFrame*(best.isKing!==undefined?0.5:1));
      applyDmgToTarget(best, dmgApplied, true);
      if(Math.random()<dt*10){
        const col=t.itRamp>0.7?'#ff0000':t.itRamp>0.4?'#ff4400':'#ff8800';
        spark(best.x+(Math.random()-0.5)*12,best.y+(Math.random()-0.5)*12,'-'+dmgApplied,col);
      }
      if(Math.random()<dt*18){
        S.particles.push({x:best.x+(Math.random()-0.5)*18,y:best.y+(Math.random()-0.5)*18,
          txt:'🔥',col:'#ff4400',life:0.22,vy:-1.8});
      }
      continue;
    }
    if(t.kbTimer>0){
      t.kbTimer-=dt;
      t.x+=t.vx*dt;
      t.y+=t.vy*dt;
      t.vx*=0.88; // Fricción
      t.vy*=0.88;
      t.x=Math.max(14,Math.min(W-14,t.x));
      t.y=Math.max(14,Math.min(H-14,t.y));
      continue; // No puede moverse ni atacar mientras se desliza
    }

    if(t.atkCd>0) t.atkCd-=dt;
    if(t.edChainTimer>0) t.edChainTimer=Math.max(0,t.edChainTimer-dt);

    if(t.champion&&updateDash(t,dt))continue;

    if(t.isWitch){
      t.spawnCd-=dt;
      const wDef = DEFS[t.defKey]||DEFS.witch_evo;
      if(t.spawnCd<=0){ witchSpawn(t); t.spawnCd=wDef.spawnInterval; }
    }

    // ── Mosquetera EVO: 3 disparos de spawn con doble daño (solo tropas, rango infinito) ──
    if(t.isMuskEvo && t.evoShotsLeft > 0){
      if(t.evoShotCd > 0){ t.evoShotCd -= dt; }
      else {
        // Solo apunta a tropas (no towers), rango infinito
        let evoTarget = null, evoBestD = Infinity;
        for(const e of theirArr){
          if(e.hp<=0) continue;
          const dd = d2(t.x,t.y,e.x,e.y);
          if(dd < evoBestD){ evoBestD=dd; evoTarget=e; }
        }
        if(evoTarget){
          const evoDmg = Math.round(t.dmg * 2); // doble daño
          S.projectiles.push({
            x:t.x, y:t.y, fromX:t.x, fromY:t.y,
            target:evoTarget, dmg:evoDmg, team:t.team,
            speed:520, splashR:12, art:'💥',
            isRangedShot:true, isMuskEvoShot:true
          });
          spark(t.x, t.y-22, '💥 EVO x'+t.evoShotsLeft, '#c77dff');
          sparkle(t.x, t.y, '⚡', '#7c3aed', 2);
          t.evoShotsLeft--;
          t.evoShotCd = 0.35; // 0.35s entre disparos
        } else {
          t.evoShotsLeft = 0; // sin tropas en campo, se descartan
        }
      }
    }
    
    // Físicas Salto Mega Caballero — fase CARGA
    if(t.isMegaKnight && t.jumpState==='charging'){
      t.jumpChargeTime+=dt;
      // Efecto visual de carga: temblor + partículas
      if(Math.random()<0.6)
        S.particles.push({x:t.x+(Math.random()-0.5)*24,y:t.y+(Math.random()-0.5)*18,
          txt:'💥',col:'#aaaaff',life:0.3,vy:-0.9});
      if(t.jumpChargeTime>=1.0){
        t.jumpState='jumping';
        t.jumpTime=0; t.jumpMaxTime=0.7;
        spark(t.x,t.y-32,'🦘 ¡SALTO!','#ffffff');
      }
      continue;
    }

    // Físicas Salto Mega Caballero
    if(t.isMegaKnight && t.jumpState==='jumping'){
      t.jumpTime+=dt;
      const prog=t.jumpTime/t.jumpMaxTime;
      if(prog>=1){
        t.x=t.jumpX; t.y=t.jumpY;
        t.jumpState='idle';
        t.atkCd=1/t.atkSpd;
        doAoEDamage(t.x, t.y, DEFS.megaknight.splashRadius, DEFS.megaknight.dmg*2, t.team, 300);
        spark(t.x, t.y-30, '💥 SMASH!', '#ffffff');
      } else {
        t.x = t.startX + (t.jumpX-t.startX)*prog;
        t.y = t.startY + (t.jumpY-t.startY)*prog;
      }
      continue;
    }

    let best=null,bestD=Infinity;
    // ── Taunt: forzar objetivo al Caballero Héroe ──
    if(t.tauntTimer > 0){
      t.tauntTimer = Math.max(0, t.tauntTimer - dt);
      if(t.tauntTarget !== null && t.tauntTimer > 0){
        const tauntPool = t.team==='player' ? S.pTroops : S.eTroops;
        const tauntUnit = tauntPool.find(a=>a.uid===t.tauntTarget&&a.hp>0);
        if(tauntUnit){ best = tauntUnit; bestD = d2(t.x,t.y,tauntUnit.x,tauntUnit.y); }
        else { t.tauntTarget=null; t.tauntTimer=0; }
      }
    }
    if(!best && t.pref==='building'){
      // Target towers + Tesla structures (even hidden)
      const buildings = [...theirTowers, ...theirArr.filter(e=>e.isTesla||e.isInfernoTower||e.isMortar)];
      for(const tw of buildings){if(tw.hp<=0)continue;const d=d2(t.x,t.y,tw.x,tw.y);if(d<bestD){bestD=d;best=tw;}}
    } else if(!best) {
      // Filter by air targeting capability
      for(const e of theirArr){
        if(e.hp<=0||e.teslaHidden)continue;
        if(e.isAir && !t.targetsAir)continue;  // skip air units if can't target air
        const d=d2(t.x,t.y,e.x,e.y);if(d<bestD){bestD=d;best=e;}
      }
      if(!best) for(const tw of theirTowers){if(tw.hp<=0)continue;const d=d2(t.x,t.y,tw.x,tw.y);if(d<bestD){bestD=d;best=tw;}}
    }
    if(!best){ if(t.isGranMinero) t.gmRamp=0; continue; }
    
    // Iniciar Salto Mega Caballero
    if(t.isMegaKnight && t.jumpState==='idle' && t.atkCd<=0 && bestD>=DEFS.megaknight.jumpMin && bestD<=DEFS.megaknight.jumpMax){
      t.jumpState='charging';
      t.jumpChargeTime=0;
      t.startX=t.x; t.startY=t.y;
      t.jumpX=best.x; t.jumpY=best.y;
      spark(t.x,t.y-26,'⚡ CARGANDO...','#c0c0ff');
      continue;
    }

    if(bestD>t.range){
      const spd = t.spd * (t.slowTimer>0 ? t.slowFactor||1 : 1);
      // Firecracker: retrocede si el enemigo se acerca demasiado
      if(t.isFirecracker && bestD < 72){
        const a=Math.atan2(best.y-t.y,best.x-t.x);
        t.x-=Math.cos(a)*spd*55*dt; t.y-=Math.sin(a)*spd*55*dt;
        t.x=Math.max(14,Math.min(W-14,t.x));
        if(!t.isAir){
          const RIVER_TOP=MID-26, RIVER_BOT=MID+26;
          const onBridge=(t.x>=80&&t.x<=128)||(t.x>=232&&t.x<=280);
          if(!onBridge){
            if(t.team==='player'&&t.y<RIVER_TOP) t.y=RIVER_TOP;
            if(t.team==='enemy'&&t.y>RIVER_BOT) t.y=RIVER_BOT;
          }
        } else { t.y=Math.max(14,Math.min(H-14,t.y)); }
        continue;
      }
      // Ground troops use 3-phase bridge pathfinding; air troops move freely
      if(!t.isAir){
        const RIVER_TOP = MID-26, RIVER_BOT = MID+26;
        const BL=104, BR=256;             // bridge x-centers
        const BL0=80,BL1=128,BR0=232,BR1=280; // bridge x-ranges
        const inRiver  = t.y > RIVER_TOP && t.y < RIVER_BOT;
        const mustCross = (t.team==='player' && best.y < RIVER_TOP && t.y >= RIVER_TOP)
                       || (t.team==='enemy'  && best.y > RIVER_BOT && t.y <= RIVER_BOT);
        let tx = best.x, ty = best.y;
        if(inRiver){
          // Phase 2 – crossing: move straight through, pin x (no lateral drift)
          tx = t.x;
          ty = t.team==='player' ? RIVER_TOP - 10 : RIVER_BOT + 10;
        } else if(mustCross){
          // Phase 1 – approach: head to nearest bridge entry
          const bx = Math.abs(t.x-BL) <= Math.abs(t.x-BR) ? BL : BR;
          const by = t.team==='player' ? RIVER_BOT : RIVER_TOP;
          tx = bx; ty = by;
        }
        // Phase 3 – freely move toward target once fully crossed
        const angle = Math.atan2(ty-t.y, tx-t.x);
        t.x += Math.cos(angle)*spd*55*dt;
        t.y += Math.sin(angle)*spd*55*dt;
        t.x = Math.max(14, Math.min(W-14, t.x));
        // Post-move enforcement
        const inRiverNow  = t.y > RIVER_TOP && t.y < RIVER_BOT;
        const onBridgeNow = (t.x>=BL0&&t.x<=BL1)||(t.x>=BR0&&t.x<=BR1);
        if(inRiverNow && !onBridgeNow){
          // Drifted off bridge while in river: snap x back into nearest lane
          const mid = (BL1+BR0)/2;
          if(t.x < mid) t.x = Math.max(BL0, Math.min(BL1, t.x));
          else           t.x = Math.max(BR0, Math.min(BR1, t.x));
        }
        if(!onBridgeNow){
          if(t.team==='player' && t.y < RIVER_TOP) t.y = RIVER_TOP;
          if(t.team==='enemy'  && t.y > RIVER_BOT) t.y = RIVER_BOT;
        }
      } else {
        const a=Math.atan2(best.y-t.y,best.x-t.x);
        t.x+=Math.cos(a)*spd*55*dt; t.y+=Math.sin(a)*spd*55*dt;
        t.x=Math.max(14,Math.min(W-14,t.x));
        t.y=Math.max(14,Math.min(H-14,t.y));
      }
    } else if(t.atkCd<=0){
      if(t.isMegaKnight){
        doAoEDamage(best.x, best.y, DEFS.megaknight.splashRadius, t.dmg, t.team, 130);
      } else if(t.isFirecracker){
        S.projectiles.push({
          x:t.x, y:t.y, fromX:t.x, fromY:t.y,
          target:best, dmg:t.dmg, team:t.team,
          speed:310, splashR:DEFS.firecracker.splashR,
          isFirecrackerShot:true, art:'🎆'
        });
        sparkle(t.x,t.y,'✨','#ff4400',2);
        // Retroceso por el impulso del disparo (alejarse del objetivo)
        applyKnockback(t, best.x, best.y, 95, 0.28);
        sparkle(t.x, t.y, '💨', '#ff6600', 2);
      } else if(t.evolution && DEFS[t.key]?.splashR){
        // Bruja Evo: daño en área
        doAoEDamage(best.x, best.y, DEFS[t.key].splashR, t.dmg, t.team, 0);
        sparkle(best.x, best.y, '🔮', '#8e44ad', 3);
      } else if(t.isGranMinero){
        // Daño con rampa: más daño si sigue atacando al mismo objetivo
        const gd = DEFS.gran_minero;
        if(t.gmTarget !== best.uid){ t.gmTarget = best.uid; t.gmRamp = 0; }
        const totalDmg = Math.round(t.dmg + t.gmRamp);
        best.hp -= totalDmg;
        t.gmRamp = Math.min(t.gmRamp + gd.dmgRamp, gd.dmgRampMax);
        const col = t.gmRamp > gd.dmgRampMax*0.5 ? '#ff6600' : '#e67e22';
        spark(best.x+(Math.random()-0.5)*14, best.y+(Math.random()-0.5)*14, '-'+totalDmg, col);
        if(t.gmRamp >= gd.dmgRampMax) sparkle(t.x, t.y, '🔥', '#ff4400', 2);
      } else if(t.isElectricDragon){
        // Cadena eléctrica BFS hasta 3 objetivos
        const ed = DEFS.electric_dragon;
        const allEnemies = [...theirArr.filter(e=>e.hp>0&&!e.teslaHidden),
                            ...theirTowers.filter(e=>e.hp>0)];
        const hit = new Set();
        const chain = [];
        const getEid = e => e.uid!==undefined ? e.uid : e.id;
        hit.add(getEid(best));
        applyDmgToTarget(best, t.dmg, true);
        spark(best.x, best.y-14, '-'+t.dmg, '#85c1e9');
        chain.push(best);
        let cur = best;
        while(chain.length < ed.edChainCount){
          let next=null, nextD=Infinity;
          for(const e of allEnemies){
            const eid=getEid(e); if(hit.has(eid)) continue;
            const dd=d2(cur.x,cur.y,e.x,e.y);
            if(dd<=ed.edChainRange&&dd<nextD){nextD=dd;next=e;}
          }
          if(!next) break;
          hit.add(getEid(next));
          const chainDmg = Math.round(t.dmg * (0.8 ** chain.length)); // cada eslabón hace 80% del anterior
          applyDmgToTarget(next, chainDmg, true);
          spark(next.x, next.y-14, '-'+chainDmg, '#85c1e9');
          chain.push(next);
          cur = next;
        }
        // Aturdir: congelar brevemente + reiniciar ataques aliados cercanos
        for(const ct of chain){
          ct.slowTimer = ed.edSlowDur; ct.slowFactor = 0.04;
          spark(ct.x, ct.y-5, '⚡', '#f4d03f');
        }
        for(const a of myArr){
          if(a.uid!==t.uid&&a.hp>0&&d2(a.x,a.y,t.x,t.y)<=100) a.atkCd=0;
        }
        // Guardar cadena para dibujarla
        t.edLastChain = chain.map(e=>({x:e.x,y:e.y,uid:getEid(e)}));
        t.edChainTimer = 0.35; // segundos que se muestra el rayo
        sparkle(t.x, t.y, '⚡', '#3498db', 4);
        spark(t.x, t.y-28, '⚡ ×'+chain.length, '#85c1e9');
      } else if(t.isCannon){
        // Cañón: dispara bala de cañón (proyectil de objetivo único)
        S.projectiles.push({
          x:t.x, y:t.y, fromX:t.x, fromY:t.y,
          target:best, dmg:t.dmg, team:t.team,
          speed:380, splashR:12, art:'💣',
          isCannonball:true
        });
        sparkle(t.x, t.y, '💨', '#aaa', 2);
        spark(t.x, t.y-18, '💥', '#7f8c8d');
      } else if(t.isWarriorHealer){
        // Golpe + curación de aliados cercanos (incluida ella misma)
        best.hp -= t.dmg;
        spark(best.x+(Math.random()-0.5)*14, best.y+(Math.random()-0.5)*14, '-'+t.dmg, '#27ae60');
        const wd = DEFS.warrior_healer;
        // Include herself in the heal pool
        const allies = myArr.filter(a=>a.hp>0 && a.hp<a.maxHp
                                    && d2(a.x,a.y,t.x,t.y)<=wd.healRadius);
        let anyHealed = false;
        for(const a of allies){
          const healAmt = Math.min(wd.healAmount, a.maxHp - a.hp);
          if(healAmt > 0){
            a.hp += healAmt;
            S.particles.push({x:a.x+(Math.random()-0.5)*10, y:a.y-10,
              txt:'+'+Math.round(healAmt), col:'#2ecc71', life:1.2, vy:-0.7});
            sparkle(a.x, a.y, '💚', '#27ae60', 2);
            anyHealed = true;
          }
        }
        if(anyHealed) sparkle(t.x, t.y, '💚', '#2ecc71', 4);
      } else {
        const isRangedAttack = (DEFS[t.key]||{}).range > 60;
        applyDmgToTarget(best, t.dmg, isRangedAttack);
        spark(best.x+(Math.random()-0.5)*16,best.y+(Math.random()-0.5)*16,'-'+t.dmg,t.team==='player'?'#ff6666':'#6688ff');
      }
      // Firecracker: 50% más lento entre disparos (retroceso del cañón)
      t.atkCd = t.isFirecracker ? 1.5/t.atkSpd : 1/t.atkSpd;
    }
  }
}

function updateTowers(towers,attackers,dt){
  for(const tw of towers){
    if(tw.hp<=0)continue; if(tw.cd>0){tw.cd-=dt;continue;}
    let best=null,bestD=Infinity;
    for(const a of attackers){
      if(a.hp<=0||a.invuln||a.jumpState==='jumping')continue;
      const d=d2(tw.x,tw.y,a.x,a.y);
      if(d<=tw.range&&d<bestD){bestD=d;best=a;}
    }
    if(best){applyDmgToTarget(best,tw.dmg,true);tw.cd=1/tw.atkSpd;spark(best.x,best.y-10,'-'+tw.dmg,'#ffaa00');}
  }
}

// ═══════════════════════════════════════════
//  WIN CHECK
// ═══════════════════════════════════════════
function checkWin(){
  for(const t of S.pTowers) if(t.hp<=0&&!t.dead){t.dead=true;if(!t.isKing)S.eCrowns++;}
  for(const t of S.eTowers) if(t.hp<=0&&!t.dead){t.dead=true;if(!t.isKing)S.pCrowns++;}
  const pk=S.pTowers.find(t=>t.isKing), ek=S.eTowers.find(t=>t.isKing);
  if(pk.hp<=0&&!pk._end){pk._end=true;S.eCrowns=3;endGame('enemy');}
  if(ek.hp<=0&&!ek._end){ek._end=true;S.pCrowns=3;endGame('player');}
}

function endGame(w){
  if(S.gameOver)return; S.gameOver=true; S.winner=w;
  const ov=document.getElementById('overlay'),rt=document.getElementById('result-text'),re=document.getElementById('result-emoji'),cr=document.getElementById('crown-result');
  ov.classList.add('show');
  if(w==='player'){re.textContent='🏆';rt.textContent='¡Victoria!';rt.className='win';cr.textContent='👑'.repeat(S.pCrowns);}
  else if(w==='enemy'){re.textContent='💀';rt.textContent='Derrota';rt.className='lose';cr.textContent='';}
  else{re.textContent='⚔️';rt.textContent='Empate';rt.className='draw';cr.textContent='';}
}

// ═══════════════════════════════════════════
//  MAIN UPDATE
// ═══════════════════════════════════════════
function update(ts){
  if(S.gameOver)return;
  const dt=Math.min((ts-lastTs)/1000,0.1); lastTs=ts;

  S.time-=dt;
  if(S.time<=30) document.getElementById('timer-box').classList.add('danger');
  if(S.time<=0){endGame(S.pCrowns>S.eCrowns?'player':S.eCrowns>S.pCrowns?'enemy':null);return;}

  S.elixirFrac+=dt; while(S.elixirFrac>=S.elixirRate&&S.elixir<10){S.elixir++;S.elixirFrac-=S.elixirRate;} if(S.elixir>=10)S.elixirFrac=0;
  S.aiElixirFrac+=dt; while(S.aiElixirFrac>=S.elixirRate&&S.aiElixir<10){S.aiElixir++;S.aiElixirFrac-=S.elixirRate;} if(S.aiElixir>=10)S.aiElixirFrac=0;

  if(S.gkAbilityCd>0) S.gkAbilityCd=Math.max(0,S.gkAbilityCd-dt);
  if(S.gkAlive&&S.gkRef&&S.gkRef.hp<=0){S.gkAlive=false;S.gkRef=null;sparkle(W/2,MID,'💀','#ff4444',5);}
  if(S.gmAlive&&S.gmRef&&S.gmRef.hp<=0){S.gmAlive=false;S.gmRef=null;sparkle(W/2,MID,'💀','#ff4444',5);}
  if(S.kcAbilityCd>0) S.kcAbilityCd=Math.max(0,S.kcAbilityCd-dt);
  if(S.kcAlive&&S.kcRef&&S.kcRef.hp<=0){S.kcAlive=false;S.kcRef=null;sparkle(W/2,MID,'💀','#ff4444',5);}

  aiStep(dt);
  updateTroops(S.pTroops,S.eTroops,S.eTowers,dt);
  updateTroops(S.eTroops,S.pTroops,S.pTowers,dt);
  updateTowers(S.pTowers,S.eTroops,dt);
  updateTowers(S.eTowers,S.pTroops,dt);
  updateProjectiles(dt);
  updateBombs(dt);
  updateBarrels(dt);
  updateRollingBarrels(dt);
  updateMortarShells(dt);
  updateLogs(dt);
  updateEarthquakes(dt);
  updateTeslas(dt);
  updateVines(dt);

  const deadP=S.pTroops.filter(t=>t.hp<=0);
  const deadE=S.eTroops.filter(t=>t.hp<=0);
  for(const t of deadP) onTroopDeath(t, S.pTroops, S.eTroops);
  for(const t of deadE) onTroopDeath(t, S.eTroops, S.pTroops);

  S.pTroops=S.pTroops.filter(t=>t.hp>0);
  S.eTroops=S.eTroops.filter(t=>t.hp>0);

  for(const p of S.particles){p.life-=dt;p.y+=p.vy;}
  S.particles=S.particles.filter(p=>p.life>0);
  checkWin();
}

// ═══════════════════════════════════════════
//  GRAN MINERO — HABILIDAD & BOMBAS
// ═══════════════════════════════════════════
function activateGranMinero(gm){
  const gd = DEFS.gran_minero;
  if(S.elixir < gd.abilityCost) return;
  S.elixir -= gd.abilityCost;

  // Dejar bomba en posición actual
  S.bombs.push({ x:gm.x, y:gm.y, team:gm.team, fuse:gd.bombFuse,
                 dmg:gd.bombDmg, radius:gd.bombRadius, pulse:0 });
  spark(gm.x, gm.y-10, '💣 BOMBA!', '#e67e22');

  // Teleportar al carril opuesto (espejo respecto al centro)
  gm.x = W - gm.x;
  gm.gmRamp = 0; gm.gmTarget = null;
  sparkle(gm.x, gm.y, '⛏️', '#e67e22', 5);
}

// ═══════════════════════════════════════════
//  TERREMOTO
// ═══════════════════════════════════════════
function updateEarthquakes(dt){
  for(const eq of S.earthquakes){
    eq.timeLeft -= dt;
    eq.tickCd   -= dt;
    if(Math.random()<0.4){
      const a=Math.random()*Math.PI*2, r=Math.random()*eq.radius;
      S.particles.push({x:eq.x+Math.cos(a)*r, y:eq.y+Math.sin(a)*r,
        txt:'•', col:'#8B4513', life:0.35, vy:-0.4});
    }
    if(eq.tickCd > 0) continue;
    eq.tickCd = eq.tickRate;
    const enemies = eq.team==='player' ? [...S.eTroops,...S.eTowers] : [...S.pTroops,...S.pTowers];
    for(const t of enemies){
      if(t.hp<=0) continue;
      if(d2(t.x,t.y,eq.x,eq.y) > eq.radius) continue;
      const isBuilding = t.isKing!==undefined || t.id || t.isTesla || t.isCannon || t.isGoblinHut || t.isInfernoTower || t.isMortar;
      let dmg = isBuilding ? eq.dmgBuilding : eq.dmgTroop;
      if(t.isKing!==undefined) dmg = Math.round(dmg*0.4);
      applyDmgToTarget(t, dmg, false);
      spark(t.x+(Math.random()-0.5)*20,t.y+(Math.random()-0.5)*12,
            '-'+dmg, isBuilding?'#e74c3c':'#e67e22');
      if(!isBuilding){ t.slowTimer=eq.slowDur; t.slowFactor=eq.slowFactor; }
    }
  }
  S.earthquakes = S.earthquakes.filter(eq=>eq.timeLeft>0);
}

function drawEarthquakes(){
  for(const eq of S.earthquakes){
    const pct = eq.timeLeft / DEFS.earthquake.duration;
    ctx.globalAlpha = 0.15 + Math.sin(Date.now()*0.015)*0.05;
    ctx.fillStyle = '#5D2E0C';
    ctx.beginPath(); ctx.arc(eq.x, eq.y, eq.radius, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.5*pct;
    ctx.strokeStyle='#c0392b'; ctx.lineWidth=2.5;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(eq.x, eq.y, eq.radius, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=0.8;
    ctx.font='20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🌍', eq.x, eq.y);
    ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════
//  TESLA — LÓGICA
// ═══════════════════════════════════════════
function updateTeslas(dt){
  for(const arr of [S.pTroops, S.eTroops]){
    for(const t of arr){
      if(!t.isTesla || t.hp<=0) continue;
      const enemies = t.team==='player' ? [...S.eTroops,...S.eTowers] : [...S.pTroops,...S.pTowers];
      const inRange = enemies.some(e=>e.hp>0 && d2(e.x,e.y,t.x,t.y)<=t.range);
      if(inRange){
        t.teslaHidden=false; t.teslaHideCd=DEFS.tesla.hideDelay;
      } else {
        t.teslaHideCd-=dt;
        if(t.teslaHideCd<=0) t.teslaHidden=true;
      }
      t.invuln=t.teslaHidden;
    }
  }
}

function drawTesla(t){
  const hw=t.w/2, hh=t.h/2, by=t.y+hh;
  if(t.teslaHidden){
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#2980b9';
    ctx.beginPath(); ctx.ellipse(t.x,by+2,11,4,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.5;
    ctx.font='11px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚡',t.x,by-2); ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
    return;
  }
  ctx.fillStyle='#1a5276'; ctx.strokeStyle='#3498db'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(t.x-hw,by-t.h,t.w,t.h,4); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#c0392b'; ctx.fillRect(t.x-hw,by-t.h-6,t.w,4);
  ctx.fillStyle='#27ae60'; ctx.fillRect(t.x-hw,by-t.h-6,t.w*(t.hp/t.maxHp),4);
  ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚡',t.x,t.y-2); ctx.textBaseline='alphabetic';
  // Rayo visual
  if(t.atkCd<0.15){
    const pool=t.team==='player'?[...S.eTroops,...S.eTowers]:[...S.pTroops,...S.pTowers];
    const best=pool.filter(e=>e.hp>0&&d2(e.x,e.y,t.x,t.y)<=t.range).sort((a,b)=>a.hp-b.hp)[0];
    if(best){
      ctx.strokeStyle='#85c1e9'; ctx.lineWidth=2; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(best.x,best.y); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
}

function updateBombs(dt){
  for(const b of S.bombs){
    b.fuse -= dt;
    b.pulse += dt * 4;
    if(b.fuse <= 0){
      // ¡BOOM!
      const targets = b.team==='player'
        ? [...S.eTroops, ...S.eTowers]
        : [...S.pTroops, ...S.pTowers];
      for(const t of targets){
        if(t.hp<=0) continue;
        if(d2(t.x,t.y,b.x,b.y) <= b.radius){
          const dm = Math.round(b.dmg * (t.isKing!==undefined ? 0.5 : 1));
          t.hp -= dm;
          spark(t.x+(Math.random()-0.5)*20, t.y+(Math.random()-0.5)*20, '-'+dm, '#ff4400');
          applyKnockback(t, b.x, b.y, 180, 0.3);
        }
      }
      sparkle(b.x, b.y, '💥', '#ff6600', 10);
      spark(b.x, b.y-20, '💥 BOOM!', '#ff4400');
      b.fuse = -999; // marcar para eliminar
    }
  }
  S.bombs = S.bombs.filter(b => b.fuse > -100);
}

function drawBombs(){
  for(const b of S.bombs){
    const pct = b.fuse / DEFS.gran_minero.bombFuse;
    const pulse = 0.85 + Math.sin(b.pulse)*0.15;
    const r = 10 * pulse;

    // Círculo de radio de explosión (se achica con el tiempo)
    ctx.globalAlpha = 0.12 + (1-pct)*0.1;
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * pct, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    // Cuerpo de la bomba
    ctx.globalAlpha = 1;
    const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
    g.addColorStop(0,'#ff4400'); g.addColorStop(1,'#1a0800');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.fill();

    // Emoji + cuenta regresiva
    ctx.font = `${10 + (1-pct)*4}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💣', b.x, b.y);
    ctx.font = 'bold 9px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText(b.fuse.toFixed(1)+'s', b.x, b.y + r + 8);
    ctx.textBaseline = 'alphabetic';
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
//  BARRIL DE DUENDES
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  MORTERO
// ═══════════════════════════════════════════
function updateMortarShells(dt){
  for(const s of S.mortarShells){
    s.elapsed+=dt;
    if(s.elapsed>=s.fallTime){
      // Impacto con splash
      const all=[...(s.team==='player'?S.eTroops:S.pTroops),
                 ...(s.team==='player'?S.eTowers:S.pTowers)];
      for(const e of all){
        if(e.hp<=0||e.isAir)continue;
        if(d2(s.tx,s.ty,e.x,e.y)<=s.splashR) e.hp-=s.dmg;
      }
      sparkle(s.tx,s.ty,'💥','#e67e22',8);
      spark(s.tx,s.ty-18,'-'+s.dmg,'#e67e22');
      s.done=true;
    }
  }
  S.mortarShells=S.mortarShells.filter(s=>!s.done);
}

function drawMortarShells(){
  for(const s of S.mortarShells){
    const pct=s.elapsed/s.fallTime; // 0→1
    // Parábola: eleva hacia el pico y luego baja
    const x=s.fromX+(s.tx-s.fromX)*pct;
    const baseY=s.fromY+(s.ty-s.fromY)*pct;
    const arc=Math.sin(pct*Math.PI)*80;
    const y=baseY-arc;

    // Sombra en el suelo (crece al bajar)
    const shadowR=6+pct*14;
    ctx.globalAlpha=0.08+pct*0.22;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(s.tx,s.ty,shadowR,0,Math.PI*2); ctx.fill();
    // Círculo de impacto (aparece al final)
    if(pct>0.6){
      ctx.globalAlpha=(pct-0.6)/0.4*0.25;
      ctx.strokeStyle='#e67e22'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(s.tx,s.ty,s.splashR,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.globalAlpha=1;

    // Proyectil
    const scale=0.7+Math.sin(pct*Math.PI)*0.6;
    ctx.font=`${14*scale}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💣',x,y); ctx.textBaseline='alphabetic';

    // Estela
    if(Math.random()<0.5)
      S.particles.push({x:x+(Math.random()-0.5)*6,y:y+4,
        txt:'💨',col:'#aaa',life:0.2,vy:0.3});
  }
  ctx.globalAlpha=1;
}

function drawMortar(t){
  const hw=t.w/2,hh=t.h/2;
  const isP=t.team==='player';
  const pct=Math.max(0,t.hp/t.maxHp);
  const reload=t.atkCd>0?1-(t.atkCd*DEFS.mortar.atkSpd):1;

  // Sombra
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(t.x,t.y+hh+3,hw*0.9,4,0,0,Math.PI*2); ctx.fill();

  // Base de piedra
  ctx.fillStyle=isP?'#4a3728':'#2c1a0e';
  ctx.strokeStyle=isP?'#8d6e63':'#a04000';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(t.x-hw,t.y-hh*0.5,t.w,hh*1.5,4); ctx.fill(); ctx.stroke();

  // Cañón apuntando hacia arriba
  ctx.fillStyle='#37474f'; ctx.strokeStyle='#546e7a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(t.x-hw*0.3,t.y-hh-8,t.w*0.3,hh*0.9,2); ctx.fill(); ctx.stroke();

  // Emoji
  ctx.font='13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💣',t.x,t.y+hh*0.3); ctx.textBaseline='alphabetic';

  // Alcance mínimo (punto ciego)
  ctx.globalAlpha=0.06;
  ctx.fillStyle='#e74c3c';
  ctx.beginPath(); ctx.arc(t.x,t.y,DEFS.mortar.minRange,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // HP bar
  const bw=t.w+6,bh=3,bx=t.x-bw/2,by=t.y-hh-16;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  ctx.fillRect(bx,by,bw*pct,bh);
  // Recarga lenta
  const rb=by+5;
  ctx.fillStyle='#1a0a00'; ctx.fillRect(bx,rb,bw,bh);
  ctx.fillStyle='#e67e22'; ctx.fillRect(bx,rb,bw*reload,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(Math.ceil(t.hp),t.x,by-2);
}

function updateLogs(dt){
  const ld=DEFS.the_log;
  for(const b of S.logs){
    const step=b.spd*dt;
    b.y+=b.dir*step;
    b.traveled+=step;
    b.angle+=b.dir*(step/18)*Math.PI*2;
    // Clamp to arena bounds
    if(b.y < 0 || b.y > H) { b.done=true; continue; }

    // Rastro
    if(Math.random()<0.3)
      S.particles.push({x:b.x+(Math.random()-0.5)*10,y:b.y+8+(Math.random()-0.5)*6,
        txt:'🍂',col:'#795548',life:0.3,vy:0.2});

    // Golpear y empujar enemigos
    const theirArr=b.team==='player'?S.eTroops:S.pTroops;
    const theirTow=b.team==='player'?S.eTowers:S.pTowers;
    for(const e of [...theirArr,...theirTow]){
      if(e.hp<=0||e.isAir||b.hit.has(e.uid??e.id))continue;
      if(Math.abs(e.x-b.x)<=ld.rollRange&&Math.abs(e.y-b.y)<=ld.rollRange+10){
        b.hit.add(e.uid??e.id);
        e.hp-=ld.rollDmg;
        // Only push troops, not towers (towers have isKing defined)
        if(e.isKing===undefined) e.y+=b.dir*ld.pushDist;
        spark(e.x,e.y-14,'-'+ld.rollDmg,'#8d6e63');
        sparkle(e.x,e.y,'💥','#795548',2);
      }
    }
    if(b.traveled>=ld.rollDist) b.done=true;
  }
  S.logs=S.logs.filter(b=>!b.done);
}

function drawLogs(){
  for(const b of S.logs){
    // Sombra
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(b.x,b.y+10,20,5,0,0,Math.PI*2); ctx.fill();

    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(b.angle);
    // Tronco — rectángulo redondeado horizontal con vetas
    ctx.fillStyle='#6d4c41'; ctx.strokeStyle='#4e342e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-20,-8,40,16,6); ctx.fill(); ctx.stroke();
    // Anillos de árbol
    ctx.strokeStyle='#5d4037'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0,0,8,5,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,0,4,2.5,0,0,Math.PI*2); ctx.stroke();
    // Textura de corteza (líneas)
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8;
    for(let lx=-14;lx<=14;lx+=8){
      ctx.beginPath(); ctx.moveTo(lx,-7); ctx.lineTo(lx+2,7); ctx.stroke();
    }
    ctx.restore();

    // Hitbox visual
    ctx.globalAlpha=0.1;
    ctx.fillStyle='#795548';
    ctx.beginPath(); ctx.ellipse(b.x,b.y,DEFS.the_log.rollRange+10,
      DEFS.the_log.rollRange,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // Progreso
    const pct=b.traveled/DEFS.the_log.rollDist;
    ctx.fillStyle='rgba(93,64,55,0.5)'; ctx.fillRect(b.x-18,b.y-22,36,3);
    ctx.fillStyle='#8d6e63'; ctx.fillRect(b.x-18,b.y-22,36*pct,3);
  }
}

function updateRollingBarrels(dt){
  const bd=DEFS.barbarian_barrel;
  for(const b of S.rollingBarrels){
    const step=b.spd*dt;
    b.y+=b.dir*step;
    b.traveled+=step;
    b.angle+=b.dir*(step/14)*Math.PI*2; // rueda por circunferencia
    // Stop at arena bounds
    if(b.y < 0 || b.y > H) { b.traveled=Infinity; continue; }

    // Rastro de tierra
    if(Math.random()<0.35)
      S.particles.push({x:b.x+(Math.random()-0.5)*12,y:b.y+(Math.random()-0.5)*8,
        txt:'💨',col:'#a04000',life:0.22,vy:-0.4});

    // Golpear enemigos dentro del hitbox
    const theirArr=b.team==='player'?S.eTroops:S.pTroops;
    const theirTow=b.team==='player'?S.eTowers:S.pTowers;
    for(const e of [...theirArr,...theirTow]){
      if(e.hp<=0||b.hit.has(e.uid??e.id)) continue;
      if(d2(b.x,b.y,e.x,e.y)<=bd.rollRange){
        b.hit.add(e.uid??e.id);
        e.hp-=bd.rollDmg;
        // Only push troops, not towers
        if(e.isKing===undefined) e.y+=b.dir*18;
        spark(e.x,e.y-14,'-'+bd.rollDmg,'#e67e22');
        sparkle(e.x,e.y,'💥','#a04000',2);
      }
    }

    // Llegó al final → spawn bárbaro
    if(b.traveled>=bd.rollDist){
      const arr=b.team==='player'?S.pTroops:S.eTroops;
      const barb=mkTroop('barbarians',b.x,b.y,b.team);
      barb.hp=bd.barbHp; barb.maxHp=bd.barbHp;
      barb.dmg=bd.barbDmg; barb.count=1;
      arr.push(barb);
      sparkle(b.x,b.y,'💪','#784212',6);
      spark(b.x,b.y-22,'¡BÁRBARO!','#e67e22');
      b.traveled=Infinity;
    }
  }
  S.rollingBarrels=S.rollingBarrels.filter(b=>b.traveled<Infinity);
}

function drawRollingBarrels(){
  for(const b of S.rollingBarrels){
    // Sombra
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(b.x,b.y+10,14,5,0,0,Math.PI*2); ctx.fill();

    // Barril rodando (rotado)
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(b.angle);
    // Cuerpo del barril
    ctx.fillStyle='#5d3a1a'; ctx.strokeStyle='#7b4c2a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,0,14,10,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Aros metálicos
    ctx.strokeStyle='#b7950b'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(0,0,14,10,0,-0.5,0.5); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,0,14,10,0,Math.PI-0.5,Math.PI+0.5); ctx.stroke();
    // Emoji encima
    ctx.font='11px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🪵',0,0);
    ctx.restore();

    // Área de daño (hitbox visual)
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#e67e22';
    ctx.beginPath(); ctx.ellipse(b.x,b.y,DEFS.barbarian_barrel.rollRange,
      DEFS.barbarian_barrel.rollRange*0.45,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // Progreso de recorrido
    const pct=b.traveled/DEFS.barbarian_barrel.rollDist;
    ctx.fillStyle='rgba(120,66,18,0.5)'; ctx.fillRect(b.x-18,b.y-24,36,4);
    ctx.fillStyle='#e67e22'; ctx.fillRect(b.x-18,b.y-24,36*pct,4);
  }
}

function updateBarrels(dt){
  const bd=DEFS.goblin_barrel;
  for(const b of S.barrels){
    b.delay-=dt; b.pulse+=dt*5;
    if(b.delay<=0){
      // ¡Impacto! Generar duendes en posiciones alrededor del punto
      const arr=b.team==='player'?S.pTroops:S.eTroops;
      const angles=[0, Math.PI*2/3, Math.PI*4/3];
      for(const ang of angles){
        const gx=b.x+Math.cos(ang)*18, gy=b.y+Math.sin(ang)*18;
        const g=mkTroop('goblins',gx,gy,b.team);
        g.hp=bd.goblinHp; g.maxHp=bd.goblinHp;
        g.dmg=bd.goblinDmg; g.count=1;
        arr.push(g);
      }
      sparkle(b.x,b.y,'💥','#16a085',8);
      spark(b.x,b.y-22,'👺 ×3','#1abc9c');
      b.delay=-999;
    }
  }
  S.barrels=S.barrels.filter(b=>b.delay>-100);
}

function drawBarrels(){
  const bd=DEFS.goblin_barrel;
  for(const b of S.barrels){
    if(b.delay<0) continue;
    const pct=b.delay/bd.barrelDelay; // 1→0 mientras cae
    // Arco parabólico: interpolar desde fromX/fromY hasta x,y
    const t2=1-pct;
    const cx=b.fromX+(b.x-b.fromX)*t2;
    const cy=b.fromY+(b.y-b.fromY)*t2 - Math.sin(t2*Math.PI)*60; // parábola
    // Sombra en el suelo (crece al acercarse)
    ctx.globalAlpha=0.15+(1-pct)*0.2;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(b.x,b.y+6,10*(1-pct*0.7),4,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // Cuenta regresiva en el suelo
    ctx.fillStyle='rgba(26,188,156,0.7)'; ctx.font='bold 8px Arial';
    ctx.textAlign='center'; ctx.fillText(b.delay.toFixed(1)+'s',b.x,b.y+16);
    // Barril en arco
    const scale=0.7+Math.sin(t2*Math.PI)*0.5;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(t2*Math.PI*3); // gira mientras vuela
    ctx.font=`${16*scale}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🛢️',0,0); ctx.textBaseline='alphabetic';
    ctx.restore();
    // Estela
    if(Math.random()<0.4)
      S.particles.push({x:cx+(Math.random()-0.5)*8,y:cy+(Math.random()-0.5)*8,
        txt:'💨',col:'#1abc9c',life:0.25,vy:-0.5});
  }
}

function updateProjectiles(dt){
  const alive=[];
  for(const p of S.projectiles){

    // ── Fragmento posicional (no sigue un objetivo, va a un punto fijo) ──
    if(p.destX !== undefined){
      const dx=p.destX-p.x, dy=p.destY-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const step=p.speed*dt;
      if(dist<=step+6){
        // Impacto del fragmento: AoE pequeño
        doAoEDamage(p.destX, p.destY, p.splashR, p.dmg, p.team, 0);
        sparkle(p.destX, p.destY, '🔥', '#ff6600', 3);
      } else {
        p.x+=dx/dist*step; p.y+=dy/dist*step;
        alive.push(p);
      }
      continue;
    }

    // ── Proyectil con seguimiento de objetivo ──
    if(!p.target||p.target.hp<=0){ continue; }
    const dx=p.target.x-p.x, dy=p.target.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const step=p.speed*dt;
    if(dist<=step+10){
      const cx=p.target.x, cy=p.target.y;

      // Impacto principal
      doAoEDamage(cx,cy,p.splashR,p.dmg,p.team,0,true);
      sparkle(cx,cy,'🔥','#ff4400',5);
      spark(cx,cy-18,'💥','#ff6600');

      if(p.isFirecrackerShot){
        // ── 5 fragmentos en cono en la dirección del disparo ──
        // El ángulo base es la dirección que viajó el proyectil (de origen a impacto)
        const baseAngle = Math.atan2(cy - (p.fromY??p.y), cx - (p.fromX??p.x));
        const fragDmg   = Math.round(p.dmg * 0.55);
        const fragDist  = 95;
        const fragSplash= 30;
        // 5 fragmentos: −40°, −20°, 0°, +20°, +40°
        for(const deg of [-40,-20,0,20,40]){
          const ang = baseAngle + deg * (Math.PI/180);
          alive.push({
            x: cx, y: cy,
            destX: cx + Math.cos(ang)*fragDist,
            destY: cy + Math.sin(ang)*fragDist,
            dmg: fragDmg, team: p.team,
            speed: 380, splashR: fragSplash,
            art: '🔥'
          });
        }
        sparkle(cx, cy, '🎆', '#ff8800', 5);
        spark(cx, cy-26, '🎆 FRAGMENTOS!', '#e74c3c');

      } else if(p.bounces>0){
        // Rebote legacy (por si otras cartas lo usan)
        const pool=p.team==='player'
          ?[...S.eTroops.filter(t=>t.hp>0),...S.eTowers.filter(t=>t.hp>0)]
          :[...S.pTroops.filter(t=>t.hp>0),...S.pTowers.filter(t=>t.hp>0)];
        let best=null,bestD=Infinity;
        for(const e of pool){
          if(e===p.target)continue;
          const dd=d2(cx,cy,e.x,e.y);
          if(dd<=p.bounceRange&&dd<bestD){bestD=dd;best=e;}
        }
        if(best){
          alive.push({x:cx,y:cy,target:best,
            dmg:Math.round(p.dmg*p.bounceDmgMult),
            team:p.team,bounces:p.bounces-1,speed:p.speed,
            splashR:p.splashR*0.8,bounceDmgMult:p.bounceDmgMult,
            bounceRange:p.bounceRange,art:'🎆'});
          sparkle(cx,cy,'⚡','#ffaa00',2);
        }
      }

    } else {
      p.x+=dx/dist*step; p.y+=dy/dist*step;
      alive.push(p);
    }
  }
  S.projectiles=alive;
}

function drawProjectiles(){
  for(const p of S.projectiles){
    const isFrag = p.destX !== undefined;
    const size   = isFrag ? 6 : 9;
    // Estela
    ctx.globalAlpha = isFrag ? 0.35 : 0.5;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,size);
    g.addColorStop(0, isFrag ? 'rgba(255,160,0,0.9)' : 'rgba(255,120,0,0.8)');
    g.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,size,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // Emoji
    ctx.font = (isFrag ? '9px' : '13px') + ' Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.art,p.x,p.y); ctx.textBaseline='alphabetic';
  }
}

// ═══════════════════════════════════════════
//  ENREDADERA
// ═══════════════════════════════════════════
function updateVines(dt){
  for(const v of S.vines){
    v.timeLeft -= dt;
    v.pulse    += dt * 4;

    // Ticks de daño: cuando timeLeft cruza el umbral
    for(let i = v.damageTicks.length-1; i >= 0; i--){
      if(v.timeLeft <= v.damageTicks[i]){
        v.damageTicks.splice(i, 1);
        for(const t of v.targets){
          if(t.hp <= 0) continue;
          const dm = Math.round(v.dmgPerTick * (t.isKing !== undefined ? 0.5 : 1));
          t.hp -= dm;
          spark(t.x, t.y-14, '-'+dm, '#27ae60');
        }
        sparkle(v.x, v.y, '🍃', '#1e8449', 5);
      }
    }

    // Partículas ambientales mientras dura
    if(Math.random() < 0.35){
      const a = Math.random()*Math.PI*2, r = Math.random()*v.radius*0.85;
      S.particles.push({x:v.x+Math.cos(a)*r, y:v.y+Math.sin(a)*r,
        txt:'🍃', col:'#27ae60', life:0.6, vy:-0.5});
    }

    // Vine expiró: liberar tropas
    if(v.timeLeft <= 0){
      for(const t of v.targets){
        if(!t.vineLocked) continue;
        t.vineLocked = false;
        if(t.vineWasAir){ t.isAir = true; t.vineWasAir = false; }
        // Reiniciar carga de ataque
        t.atkCd = 1 / (t.atkSpd || 1);
      }
    }
  }
  S.vines = S.vines.filter(v => v.timeLeft > 0);
}

function drawVines(){
  for(const v of S.vines){
    const pct   = v.timeLeft / DEFS.vine.duration;
    const pulse = 0.9 + Math.sin(v.pulse)*0.1;

    // Área verde translúcida
    ctx.globalAlpha = 0.13 + Math.sin(v.pulse)*0.04;
    ctx.fillStyle = '#1e8449';
    ctx.beginPath(); ctx.arc(v.x, v.y, v.radius*pulse, 0, Math.PI*2); ctx.fill();

    // Borde pulsante
    ctx.globalAlpha = 0.5 * pct;
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth   = 2.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.arc(v.x, v.y, v.radius, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    // Líneas de enredadera hacia cada objetivo atrapado
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth   = 1.5;
    for(const t of v.targets){
      if(t.hp <= 0) continue;
      ctx.beginPath();
      ctx.moveTo(v.x, v.y);
      // Zigzag simple: punto intermedio desplazado
      const mx = (v.x+t.x)/2 + Math.sin(v.pulse+t.uid)*14;
      const my = (v.y+t.y)/2 + Math.cos(v.pulse+t.uid)*10;
      ctx.quadraticCurveTo(mx, my, t.x, t.y);
      ctx.stroke();

      // Icono 🌿 sobre el objetivo atrapado
      ctx.globalAlpha = 0.9;
      ctx.font = '12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🌿', t.x, t.y - (t.h||20)/2 - 10);
      ctx.textBaseline = 'alphabetic';
    }

    // Emoji central
    ctx.globalAlpha = 0.85;
    ctx.font = '18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🌿', v.x, v.y);
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
  }
}
